<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Tasks</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0F;--surface:#13131A;--surface2:#1C1C26;--border:rgba(255,255,255,.08);
  --text:#F0EFF6;--muted:#8B8BA7;--accent:#7C6FFF;--accent-soft:rgba(124,111,255,.12);
  --accent-mid:rgba(124,111,255,.25);--green:#34C759;--red:#FF3B30;
  --amber:#FF9500;--font:-apple-system,'Helvetica Neue',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;padding-bottom:calc(68px + var(--safe-bottom));}
/* Topbar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);border-bottom:.5px solid var(--border);padding:calc(var(--safe-top) + 8px) 14px 8px;display:flex;align-items:center;gap:10px}
#topbar-av{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
#topbar-name{font-size:16px;font-weight:700;flex:1}
#topbar-sub{font-size:12px;color:var(--muted)}
#notif-btn{position:relative;background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;padding:4px;flex-shrink:0;display:flex;align-items:center}
#notif-badge{display:none;position:absolute;top:-1px;right:-1px;min-width:16px;height:16px;background:var(--red);color:#fff;border-radius:8px;font-size:10px;font-weight:700;line-height:16px;text-align:center;padding:0 3px}
/* Content */
#content{padding-top:calc(var(--safe-top) + 64px);min-height:100dvh}
/* Bottom nav */
#botnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:.5px solid var(--border);padding:8px 0 calc(var(--safe-bottom) + 4px);display:grid;grid-template-columns:repeat(4,1fr)}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10px;padding:2px 4px;-webkit-tap-highlight-color:transparent}
.bn-item i{font-size:22px}
/* Section header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
/* Task card */
.task-card{background:var(--surface);margin:4px 10px;border-radius:13px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.tc-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.tc-check{width:22px;height:22px;border-radius:11px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,border-color .15s}
.tc-check.done{background:var(--green);border-color:var(--green)}
.tc-check.done i{color:#fff;font-size:13px}
.tc-title{font-size:14px;font-weight:600;flex:1;line-height:1.3}
.tc-title.done{text-decoration:line-through;color:var(--muted)}
.tc-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tc-chev{color:var(--muted);font-size:18px;transition:transform .2s;flex-shrink:0}
.tc-chev.open{transform:rotate(90deg)}
.tc-personal{display:inline-block;font-size:10px;background:rgba(255,149,0,.15);color:var(--amber);border-radius:4px;padding:1px 5px;margin-left:5px}
/* Task detail (expanded) */
.tc-detail{border-top:.5px solid var(--border);padding:12px 14px}
.tabs{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.tab-btn.active{background:var(--accent-soft);border-color:var(--accent-mid);color:var(--accent)}
.tab-content{margin-top:8px}
/* Steps */
.step-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)}
.step-row:last-child{border-bottom:none}
.step-chk{width:20px;height:20px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .15s}
.step-chk.done{background:var(--green);border-color:var(--green)}
.step-chk.done i{color:#fff;font-size:11px}
.step-txt{font-size:13px;flex:1;color:var(--text)}
.step-txt.done{text-decoration:line-through;color:var(--muted)}
.step-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:16px;-webkit-tap-highlight-color:transparent}
.step-add-row{display:flex;gap:8px;margin-top:8px}
.step-add-inp{flex:1;background:var(--surface2);border:.5px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.step-add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
/* Notes */
.notes-ta{width:100%;min-height:100px;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;resize:vertical;line-height:1.6}
.save-btn{margin-top:8px;padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
/* Comments */
.cmts-wrap{display:flex;flex-direction:column;gap:10px}
.cmt-add{display:flex;align-items:flex-start;gap:8px}
.cmt-av{width:28px;height:28px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.cmt-inp{flex:1;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;resize:none;min-height:38px}
.cmt-inp:focus{border-color:var(--accent-mid)}
.cmt-send{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;align-self:flex-end}
.cmt-bubble{background:var(--surface2);border-radius:10px;padding:9px 12px}
.cmt-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cmt-name{font-size:11px;font-weight:700;color:var(--accent)}
.cmt-ts{font-size:10px;color:var(--muted)}
.cmt-flag-btn{background:none;border:none;cursor:pointer;font-size:14px;margin-left:auto;padding:0;-webkit-tap-highlight-color:transparent}
.cmt-text{font-size:13px;color:var(--text);line-height:1.5}
.cmt-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px}
/* Notification panel */
#notif-overlay{position:fixed;inset:0;z-index:400;display:none}
#notif-panel{position:absolute;top:calc(var(--safe-top) + 56px);right:8px;width:min(300px,calc(100vw - 16px));max-height:380px;background:var(--surface);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow-y:auto;border:.5px solid var(--border)}
.notif-item{padding:10px 14px;border-bottom:.5px solid var(--border);cursor:pointer}
.notif-item:last-child{border-bottom:none}
/* Add task FAB */
#fab{position:fixed;bottom:calc(72px + var(--safe-bottom));right:16px;width:52px;height:52px;border-radius:26px;background:var(--accent);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,111,255,.4);cursor:pointer;z-index:150;-webkit-tap-highlight-color:transparent}
/* Add task modal */
.add-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end}
.add-overlay.open{display:flex}
.add-sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px calc(var(--safe-bottom) + 20px);width:100%;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.add-sheet h3{font-size:16px;font-weight:700;margin-bottom:14px}
.add-inp{width:100%;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;margin-bottom:12px}
.add-inp:focus{border-color:var(--accent-mid)}
.add-actions{display:flex;gap:8px;justify-content:flex-end}
.add-cancel{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer}
.add-save{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer}
/* Progress bar */
.prog-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
/* Error / Loading */
.msg-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60dvh;gap:12px;color:var(--muted);text-align:center;padding:20px}
.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-av"></div>
  <div style="flex:1">
    <div id="topbar-name">Loading…</div>
    <div id="topbar-sub"></div>
  </div>
  <button id="notif-btn" onclick="openNotifPanel()">
    <i class="ti ti-bell"></i>
    <span id="notif-badge">0</span>
  </button>
</div>

<div id="content">
  <div class="msg-center">
    <i class="ti ti-loader spinning" style="font-size:32px"></i>
    <p>Loading your tasks…</p>
  </div>
</div>

<button id="fab" onclick="openAddTask()" title="Add personal task"><i class="ti ti-plus"></i></button>

<nav id="botnav">
  <a href="chain.html" class="bn-item"><i class="ti ti-home"></i><span>Home</span></a>
  <a href="mindmapv18.html" class="bn-item"><i class="ti ti-chart-network"></i><span>Map</span></a>
  <a href="timeblocksv1.html" class="bn-item"><i class="ti ti-clock-bolt"></i><span>Time</span></a>
  <a href="mindmapv25.html" class="bn-item"><i class="ti ti-sparkles"></i><span>AI</span></a>
</nav>

<!-- Notification panel -->
<div id="notif-overlay" onclick="closeNotifPanel()">
  <div id="notif-panel">
    <div style="padding:12px 14px;font-size:14px;font-weight:700;border-bottom:.5px solid var(--border)"><i class="ti ti-bell" style="color:var(--accent)"></i> Notifications</div>
    <div id="notif-list"></div>
  </div>
</div>

<!-- Add personal task modal -->
<div class="add-overlay" id="add-overlay" onclick="if(event.target===this)closeAddTask()">
  <div class="add-sheet">
    <h3>Add Personal Task</h3>
    <input class="add-inp" id="add-inp" placeholder="Task name…" autocomplete="off" onkeydown="if(event.key==='Enter')savePersonalTask()">
    <div class="add-actions">
      <button class="add-cancel" onclick="closeAddTask()">Cancel</button>
      <button class="add-save" onclick="savePersonalTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://ienfjretjvoupzwncnjb.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllbmZqcmV0anZvdXB6d25jbmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTU4NjcsImV4cCI6MjA5NzM3MTg2N30.zItQB5JjKGaM2gGR4eJWBGX4WGgvc1CEYG9Z1I7yU2A';
var LOCAL_KEY='chain_local_v1';
var STATE_ROW='main';
var db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

var D={};
var pid='';
var person=null;
var openTaskId=null;

function xe(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

/* ── Data ───────────────────────────────────────────────── */
async function ld(){
  var local=localStorage.getItem(LOCAL_KEY);
  if(local){try{D=JSON.parse(local);}catch(e){}}
  if(!navigator.onLine)return;
  try{
    var res=await db.from('chain_state').select('data').eq('id',STATE_ROW).maybeSingle();
    if(res.data&&res.data.data){
      var cloud=res.data.data;
      if(!D._ts||!cloud._ts||cloud._ts>=D._ts){D=cloud;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));}
    }
  }catch(e){}
}

async function sv(){
  D._ts=new Date().toISOString();
  localStorage.setItem(LOCAL_KEY,JSON.stringify(D));
  if(!navigator.onLine)return;
  try{await db.from('chain_state').upsert({id:STATE_ROW,data:D},{onConflict:'id'});}catch(e){}
}

function startRealtime(){
  db.channel('delegate_rt_'+pid).on('postgres_changes',{event:'UPDATE',schema:'public',table:'chain_state'},function(payload){
    var cloud=payload.new&&payload.new.data;
    if(cloud&&(!D._ts||cloud._ts>D._ts)){
      D=cloud;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));
      updateNotifBadge();
      if(openTaskId){var det=document.getElementById('tc-detail-'+openTaskId);if(det&&det.style.display!=='none')renderDetail(openTaskId);}
    }
  }).subscribe();
}

/* ── Init ───────────────────────────────────────────────── */
(async function(){
  var params=new URLSearchParams(window.location.search);
  pid=params.get('pid')||'';
  if(!pid){showError('Invalid link — no person ID.');return;}

  localStorage.setItem('chain_delegate_pid',pid);

  await ld();

  person=(D.people||[]).find(function(p){return p.id===pid;});
  if(!person){
    /* Might be stale local cache — force cloud load */
    if(navigator.onLine){
      try{
        var res2=await db.from('chain_state').select('data').eq('id',STATE_ROW).maybeSingle();
        if(res2.data&&res2.data.data){D=res2.data.data;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));}
      }catch(e){}
      person=(D.people||[]).find(function(p){return p.id===pid;});
    }
    if(!person){showError('Person not found. Please ask your manager to share your link again.');return;}
  }

  var av=document.getElementById('topbar-av');
  av.style.background=person.color||'#7C6FFF';
  av.textContent=(person.name||'?').charAt(0).toUpperCase();
  document.getElementById('topbar-name').textContent=person.name||'';
  document.getElementById('topbar-sub').textContent=(person.role||'')+(person.dept?' · '+person.dept:'');
  document.title=(person.name||'Employee')+' — Tasks';

  render();
  updateNotifBadge();
  if(navigator.onLine)startRealtime();
})();

function showError(msg){
  document.getElementById('content').innerHTML=
    '<div class="msg-center"><i class="ti ti-alert-circle" style="font-size:40px;color:var(--red)"></i><p>'+xe(msg)+'</p></div>';
  document.getElementById('fab').style.display='none';
}

/* ── Task helpers ───────────────────────────────────────── */
function myTasks(){
  return (D.tasks||[]).filter(function(t){
    return t.assignedPersonId===pid||(t.isPersonal&&t.personalOwnerId===pid);
  });
}

/* ── Render ─────────────────────────────────────────────── */
function render(){
  var tasks=myTasks();
  var active=tasks.filter(function(t){return !t.done;});
  var done=tasks.filter(function(t){return t.done;});
  var html='';
  if(!tasks.length){
    html='<div class="msg-center"><i class="ti ti-list-check" style="font-size:40px;opacity:.3"></i><p>No tasks yet.<br><small>Tap + to add a personal task.</small></p></div>';
  } else {
    if(active.length){
      html+='<div class="sec-hdr"><span>Active ('+active.length+')</span></div>';
      html+=active.map(taskCardHtml).join('');
    }
    if(done.length){
      html+='<div class="sec-hdr"><span>Done ('+done.length+')</span></div>';
      html+=done.map(taskCardHtml).join('');
    }
  }
  document.getElementById('content').innerHTML=html;
  if(openTaskId){
    var det=document.getElementById('tc-detail-'+openTaskId);
    var chev=document.getElementById('tc-chev-'+openTaskId);
    if(det){det.style.display='';renderDetail(openTaskId);}
    if(chev){chev.classList.add('open');}
  }
}

function taskCardHtml(t){
  var steps=t.steps||[];
  var doneSteps=steps.filter(function(s){return s.done;}).length;
  var pct=steps.length?Math.round(doneSteps/steps.length*100):0;
  var cntCmts=(t.comments||[]).length;
  var personal=t.isPersonal?'<span class="tc-personal">Personal</span>':'';
  return '<div class="task-card" id="tc-'+t.id+'">'+
    '<div class="tc-header" onclick="toggleTask(\''+t.id+'\')">'+
      '<div class="tc-check'+(t.done?' done':'')+'" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')">'+
        (t.done?'<i class="ti ti-check"></i>':'')+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="tc-title'+(t.done?' done':'\'')+'">'+xe(t.title)+personal+'</div>'+
        '<div class="tc-meta">'+
          (steps.length?pct+'% · '+doneSteps+'/'+steps.length+' steps'+(cntCmts?' · 💬 '+cntCmts:''):
           (cntCmts?'💬 '+cntCmts+' comments':'No steps'))+
        '</div>'+
        (steps.length?'<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%"></div></div>':'')+
      '</div>'+
      '<i class="ti ti-chevron-right tc-chev" id="tc-chev-'+t.id+'"></i>'+
    '</div>'+
    '<div class="tc-detail" id="tc-detail-'+t.id+'" style="display:none"></div>'+
  '</div>';
}

function toggleTask(id){
  openTaskId=(openTaskId===id)?null:id;
  document.querySelectorAll('.tc-detail').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.tc-chev').forEach(function(el){el.classList.remove('open');});
  if(openTaskId){
    var det=document.getElementById('tc-detail-'+openTaskId);
    var chev=document.getElementById('tc-chev-'+openTaskId);
    if(det){det.style.display='';renderDetail(openTaskId);}
    if(chev){chev.classList.add('open');}
  }
}

function toggleDone(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  if(!t)return;
  t.done=!t.done;
  sv();render();
}

/* ── Detail ─────────────────────────────────────────────── */
var _ctab={};
function renderDetail(id){
  var det=document.getElementById('tc-detail-'+id);
  if(!det||det.style.display==='none')return;
  var tab=_ctab[id]||'steps';
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  if(!t)return;
  var cntCmts=(t.comments||[]).length;
  det.innerHTML=
    '<div class="tabs">'+
      '<button class="tab-btn'+(tab==='steps'?' active':'')+'" onclick="setDTab(\''+id+'\',\'steps\')">Steps</button>'+
      '<button class="tab-btn'+(tab==='notes'?' active':'')+'" onclick="setDTab(\''+id+'\',\'notes\')">Notes</button>'+
      '<button class="tab-btn'+(tab==='comments'?' active':'')+'" onclick="setDTab(\''+id+'\',\'comments\')">💬'+(cntCmts?' '+cntCmts:'')+'</button>'+
    '</div>'+
    '<div class="tab-content" id="dtab-'+id+'"></div>';
  renderDTab(id,tab);
}

function setDTab(id,tab){_ctab[id]=tab;renderDetail(id);}

function renderDTab(id,tab){
  var el=document.getElementById('dtab-'+id);if(!el)return;
  if(tab==='steps')renderDSteps(id,el);
  else if(tab==='notes')renderDNotes(id,el);
  else renderDComments(id,el);
}

/* Steps */
function renderDSteps(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  var steps=t.steps||[];
  var html=steps.length?steps.map(function(s){
    return '<div class="step-row">'+
      '<div class="step-chk'+(s.done?' done':'')+'" onclick="toggleStep(\''+id+'\',\''+s.id+'\')">'+
        (s.done?'<i class="ti ti-check"></i>':'')+
      '</div>'+
      '<span class="step-txt'+(s.done?' done':'\'')+'">'+xe(s.text)+'</span>'+
      '<button class="step-del" onclick="delStep(\''+id+'\',\''+s.id+'\')" title="Delete"><i class="ti ti-x"></i></button>'+
    '</div>';
  }).join(''):'<div style="padding:8px 0;color:var(--muted);font-size:13px">No steps yet</div>';
  html+='<div class="step-add-row">'+
    '<input class="step-add-inp" id="step-inp-'+id+'" placeholder="Add step…" autocomplete="off" onkeydown="if(event.key===\'Enter\')addStep(\''+id+'\')">'+
    '<button class="step-add-btn" onclick="addStep(\''+id+'\')">Add</button>'+
  '</div>';
  el.innerHTML=html;
}

function toggleStep(tid,sid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  var s=(t.steps||[]).find(function(x){return x.id===sid;});if(!s)return;
  s.done=!s.done;sv();
  renderDSteps(tid,document.getElementById('dtab-'+tid));
}

function addStep(tid){
  var inp=document.getElementById('step-inp-'+tid);if(!inp)return;
  var txt=inp.value.trim();if(!txt)return;
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  if(!t.steps)t.steps=[];
  t.steps.push({id:uid(),text:txt,done:false,tags:[]});
  sv();inp.value='';renderDSteps(tid,document.getElementById('dtab-'+tid));
}

function delStep(tid,sid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  t.steps=(t.steps||[]).filter(function(s){return s.id!==sid;});
  sv();renderDSteps(tid,document.getElementById('dtab-'+tid));
}

/* Notes */
function renderDNotes(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  el.innerHTML='<textarea class="notes-ta" id="notes-ta-'+id+'" placeholder="Write notes…">'+xe(t.notes||'')+'</textarea>'+
    '<button class="save-btn" onclick="saveNotes(\''+id+'\')">Save Notes</button>';
}
function saveNotes(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  var ta=document.getElementById('notes-ta-'+id);
  if(!t||!ta)return;t.notes=ta.value;sv();
}

/* Comments */
function renderDComments(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  var cmts=t.comments||[];
  var avInit=(person.name||'?').charAt(0).toUpperCase();
  var avColor=person.color||'var(--accent)';
  var html='<div class="cmts-wrap">'+
    '<div class="cmt-add">'+
      '<div class="cmt-av" style="background:'+avColor+'">'+xe(avInit)+'</div>'+
      '<textarea class="cmt-inp" id="cmt-inp-'+id+'" placeholder="Write a comment…" rows="1" onkeydown="cmtKey(event,\''+id+'\')"></textarea>'+
      '<button class="cmt-send" onclick="sendComment(\''+id+'\')">Send</button>'+
    '</div>';
  if(!cmts.length){
    html+='<div class="cmt-empty"><i class="ti ti-message-circle" style="font-size:28px;opacity:.3;display:block;margin-bottom:6px"></i>No comments yet</div>';
  } else {
    html+=cmts.slice().reverse().map(function(c){
      var isOwner=c.pid==='owner';
      var cAvColor=isOwner?'var(--accent)':avColor;
      var cAvTxt=isOwner?'M':xe(avInit);
      var dt=new Date(c.ts);
      var ts=dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      return '<div class="cmt-bubble">'+
        '<div class="cmt-meta">'+
          '<div class="cmt-av" style="background:'+cAvColor+';font-size:11px">'+cAvTxt+'</div>'+
          '<span class="cmt-name">'+xe(isOwner?'Manager':c.pname)+'</span>'+
          '<span class="cmt-ts">'+ts+'</span>'+
          (!isOwner?'<button class="cmt-flag-btn" onclick="flagComment(\''+id+'\',\''+c.id+'\')" title="Flag">'+(c.flagged?'❓':'🏳')+'</button>':'')+
        '</div>'+
        '<div class="cmt-text">'+xe(c.text)+'</div>'+
      '</div>';
    }).join('');
  }
  html+='</div>';el.innerHTML=html;
}

function cmtKey(e,id){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendComment(id);}}

function sendComment(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  var inp=document.getElementById('cmt-inp-'+id);
  if(!t||!inp)return;
  var txt=inp.value.trim();if(!txt)return;
  if(!t.comments)t.comments=[];
  t.comments.push({id:uid(),pid:pid,pname:person.name,text:txt,ts:new Date().toISOString(),flagged:false});
  addDelegateNotification('comment_added',t.id,t.title);
  sv();inp.value='';renderDComments(id,document.getElementById('dtab-'+id));
}

function flagComment(tid,cid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  var c=(t.comments||[]).find(function(x){return x.id===cid;});if(!c)return;
  c.flagged=!c.flagged;
  if(c.flagged)addDelegateNotification('task_flagged',t.id,t.title);
  sv();renderDComments(tid,document.getElementById('dtab-'+tid));
}

/* ── Personal tasks ─────────────────────────────────────── */
function openAddTask(){
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('add-inp').focus();},100);
}
function closeAddTask(){
  document.getElementById('add-overlay').classList.remove('open');
  document.getElementById('add-inp').value='';
}
function savePersonalTask(){
  var inp=document.getElementById('add-inp');
  var name=inp.value.trim();if(!name)return;
  var task={id:uid(),title:name,assignedPersonId:pid,isPersonal:true,personalOwnerId:pid,
    done:false,notes:'',createdAt:new Date().toISOString(),steps:[],tags:[],comments:[],
    projectId:null,dueDate:null,goalId:null,categoryId:null,target:'',preparation:'',bizId:null};
  if(!D.tasks)D.tasks=[];
  D.tasks.unshift(task);
  sv();closeAddTask();render();
}

/* ── Notifications ──────────────────────────────────────── */
function addDelegateNotification(type,taskId,taskTitle){
  if(!D.notifications)D.notifications=[];
  D.notifications.unshift({id:uid(),toId:'owner',fromPid:pid,type:type,taskId:taskId,
    taskTitle:taskTitle,fromName:person.name,ts:new Date().toISOString(),readBy:[]});
}

function myUnreadCount(){
  return (D.notifications||[]).filter(function(n){
    return n.toId===pid&&!(n.readBy||[]).includes(pid);
  }).length;
}

function updateNotifBadge(){
  var cnt=myUnreadCount();
  var badge=document.getElementById('notif-badge');if(!badge)return;
  if(cnt>0){badge.style.display='';badge.textContent=cnt>9?'9+':cnt;}
  else badge.style.display='none';
}

function openNotifPanel(){
  var list=document.getElementById('notif-list');
  var myNotifs=(D.notifications||[]).filter(function(n){return n.toId===pid;}).slice(0,30);
  if(!myNotifs.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No notifications yet</div>';
  } else {
    list.innerHTML=myNotifs.map(function(n){
      var unread=!(n.readBy||[]).includes(pid);
      var icon=n.type==='task_assigned'?'📌':n.type==='comment_added'?'💬':'❓';
      var dt=new Date(n.ts);
      var ts=dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      return '<div class="notif-item" style="'+(unread?'background:rgba(124,111,255,.07)':'')+'" onclick="closeNotifPanel();'+(n.taskId?'openTaskById(\''+n.taskId+'\')':'')+'">' +
        '<div style="font-size:13px;font-weight:600;color:var(--text)">'+icon+' '+xe(n.fromName||'Manager')+' — '+xe(n.taskTitle||'')+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+n.type.replace(/_/g,' ')+' · '+ts+'</div>'+
      '</div>';
    }).join('');
  }
  var changed=false;
  (D.notifications||[]).forEach(function(n){
    if(n.toId===pid&&!(n.readBy||[]).includes(pid)){n.readBy.push(pid);changed=true;}
  });
  if(changed){sv();updateNotifBadge();}
  document.getElementById('notif-overlay').style.display='';
}
function closeNotifPanel(){document.getElementById('notif-overlay').style.display='none';}

function openTaskById(id){
  openTaskId=id;render();
  setTimeout(function(){var el=document.getElementById('tc-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}
</script>
</body>
