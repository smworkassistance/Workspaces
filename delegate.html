<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Tasks</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Light theme — distinct from dark admin app */
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --surface2:#F2F2F7;
  --border:rgba(60,60,67,.12);
  --border-strong:rgba(60,60,67,.22);
  --text:#1C1C1E;
  --text2:#3C3C43;
  --muted:#8E8E93;
  --accent:#6B5FFF;
  --accent-soft:rgba(107,95,255,.1);
  --accent-mid:rgba(107,95,255,.2);
  --green:#34C759;
  --red:#FF3B30;
  --amber:#FF9500;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --font:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;
  padding-bottom:calc(62px + var(--safe-b));}

/* ── Topbar ─────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--border);
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  display:flex;align-items:center;gap:12px
}
#topbar-av{
  width:38px;height:38px;border-radius:19px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:var(--shadow)
}
#topbar-info{flex:1;min-width:0}
#topbar-name{font-size:17px;font-weight:700;color:var(--text)}
#topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
#notif-btn{
  position:relative;background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:22px;padding:6px;flex-shrink:0;
  display:flex;align-items:center;border-radius:10px
}
#notif-btn:active{background:var(--surface2)}
#notif-badge{
  display:none;position:absolute;top:1px;right:1px;
  min-width:17px;height:17px;background:var(--red);color:#fff;
  border-radius:9px;font-size:10px;font-weight:700;
  line-height:17px;text-align:center;padding:0 4px;
  border:2px solid #fff
}

/* ── Search ─────────────────────────────────────── */
#search-wrap{
  padding:10px 16px 6px;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  position:sticky;top:calc(var(--safe-t) + 58px);z-index:100
}
#search-inner{
  display:flex;align-items:center;gap:8px;
  background:rgba(118,118,128,.12);border-radius:10px;padding:8px 12px
}
#search-inner i{color:var(--muted);font-size:16px;flex-shrink:0}
#search-inp{
  flex:1;background:none;border:none;outline:none;
  font-size:15px;font-family:var(--font);color:var(--text)
}
#search-inp::placeholder{color:var(--muted)}

/* ── Content ─────────────────────────────────────── */
#content{padding-top:calc(var(--safe-t) + 114px)}

/* ── Bottom nav ─────────────────────────────────── */
#botnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--border);
  padding:8px 0 calc(var(--safe-b) + 4px);
  display:grid;grid-template-columns:repeat(4,1fr)
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;color:var(--muted);font-size:10px;
  font-weight:500;padding:2px 4px
}
.bn-item i{font-size:22px}
.bn-item.active{color:var(--accent)}

/* ── Section header ─────────────────────────────── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 8px;
}
.sec-hdr-left{display:flex;align-items:center;gap:8px}
.sec-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:14px
}
.sec-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.01em}
.sec-count{
  font-size:12px;font-weight:600;color:var(--muted);
  background:rgba(118,118,128,.12);border-radius:8px;padding:2px 8px
}

/* ── Task card ──────────────────────────────────── */
.task-group{margin:0 12px 4px}
.task-card{
  background:var(--surface);border-radius:12px;overflow:hidden;
  margin-bottom:1px;box-shadow:var(--shadow)
}
.task-card:first-child{border-radius:12px 12px 0 0}
.task-card:last-child{border-radius:0 0 12px 12px;margin-bottom:0}
.task-card:only-child{border-radius:12px}
.tc-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent
}
.tc-header:active{background:rgba(0,0,0,.03)}
.tc-check{
  width:24px;height:24px;border-radius:12px;
  border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.15s
}
.tc-check.done{background:var(--green);border-color:var(--green)}
.tc-check.done i{color:#fff;font-size:13px}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-title.done{text-decoration:line-through;color:var(--muted)}
.tc-meta{font-size:12px;color:var(--muted);margin-top:3px}
.tc-chev{color:var(--muted);font-size:18px;transition:transform .2s;flex-shrink:0;opacity:.5}
.tc-chev.open{transform:rotate(90deg)}
.prog-wrap{height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.tc-tag-personal{
  display:inline-block;font-size:10px;background:rgba(255,149,0,.12);
  color:var(--amber);border-radius:5px;padding:1px 6px;margin-left:6px;font-weight:600
}

/* ── Detail panel ───────────────────────────────── */
.tc-detail{border-top:.5px solid var(--border);padding:12px 14px;background:#FAFAFE}
.tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:6px 14px;border-radius:8px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font)
}
.tab-btn.active{background:var(--accent-soft);border-color:var(--accent-mid);color:var(--accent)}
.tab-content{margin-top:8px}

/* ── Steps ──────────────────────────────────────── */
.step-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
.step-row:last-of-type{border-bottom:none}
.step-chk{
  width:20px;height:20px;border-radius:10px;
  border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;transition:.15s
}
.step-chk.done{background:var(--green);border-color:var(--green)}
.step-chk.done i{color:#fff;font-size:11px}
.step-txt{font-size:14px;flex:1;color:var(--text)}
.step-txt.done{text-decoration:line-through;color:var(--muted)}
.step-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:16px;opacity:.6}
.step-add-row{display:flex;gap:8px;margin-top:10px}
.step-add-inp{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--text);
  font-size:14px;font-family:var(--font);outline:none
}
.step-add-inp:focus{border-color:var(--accent-mid)}
.step-add-btn{
  background:var(--accent);color:#fff;border:none;
  border-radius:9px;padding:9px 16px;font-size:13px;
  font-weight:600;cursor:pointer
}

/* ── Notes ──────────────────────────────────────── */
.notes-ta{
  width:100%;min-height:90px;background:var(--bg);
  border:1.5px solid var(--border);border-radius:10px;
  padding:10px 12px;color:var(--text);font-size:14px;
  font-family:var(--font);outline:none;resize:vertical;line-height:1.6
}
.notes-ta:focus{border-color:var(--accent-mid)}
.save-btn{
  margin-top:10px;padding:10px 20px;background:var(--accent);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer
}

/* ── Comments ───────────────────────────────────── */
.cmts-wrap{display:flex;flex-direction:column;gap:10px}
.cmt-add-row{display:flex;align-items:flex-start;gap:8px}
.cmt-av{
  width:30px;height:30px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0
}
.cmt-inp{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 12px;color:var(--text);
  font-size:14px;font-family:var(--font);outline:none;
  resize:none;min-height:40px
}
.cmt-inp:focus{border-color:var(--accent-mid)}
.cmt-send{
  background:var(--accent);color:#fff;border:none;
  border-radius:9px;padding:9px 16px;font-size:13px;
  font-weight:600;cursor:pointer;flex-shrink:0;align-self:flex-end
}
.cmt-bubble{
  background:var(--bg);border-radius:12px;
  padding:10px 12px;border:.5px solid var(--border)
}
.cmt-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cmt-name{font-size:11px;font-weight:700;color:var(--accent)}
.cmt-ts{font-size:10px;color:var(--muted)}
.cmt-flag-btn{background:none;border:none;cursor:pointer;font-size:14px;margin-left:auto;padding:0}
.cmt-text{font-size:13px;color:var(--text);line-height:1.5}
.cmt-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px}

/* ── Notification panel ─────────────────────────── */
#notif-overlay{position:fixed;inset:0;z-index:400;display:none}
#notif-panel{
  position:absolute;top:calc(var(--safe-t) + 62px);right:8px;
  width:min(300px,calc(100vw - 16px));max-height:400px;
  background:var(--surface);border-radius:14px;
  box-shadow:var(--shadow-md);overflow-y:auto;
  border:.5px solid var(--border)
}
.notif-item{padding:10px 14px;border-bottom:.5px solid var(--border);cursor:pointer}
.notif-item:last-child{border-bottom:none}
.notif-item:active{background:var(--bg)}

/* ── FAB ─────────────────────────────────────────── */
#fab{
  position:fixed;bottom:calc(70px + var(--safe-b));right:16px;
  width:52px;height:52px;border-radius:26px;
  background:var(--accent);color:#fff;border:none;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(107,95,255,.4);cursor:pointer;z-index:150
}

/* ── Add task sheet ─────────────────────────────── */
.add-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);
  z-index:500;display:none;align-items:flex-end
}
.add-overlay.open{display:flex}
.add-sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 16px calc(var(--safe-b) + 24px);width:100%;
  box-shadow:var(--shadow-md);animation:slideUp .22s ease
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.add-sheet h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px}
.f-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.f-inp{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:12px;color:var(--text);font-size:15px;
  font-family:var(--font);outline:none;margin-bottom:14px
}
.f-inp:focus{border-color:var(--accent-mid)}
.f-sel{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:12px;color:var(--text);font-size:15px;
  font-family:var(--font);outline:none;margin-bottom:14px;
  -webkit-appearance:none
}
.f-sel:focus{border-color:var(--accent-mid)}
.add-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{
  background:var(--bg);border:1.5px solid var(--border);
  color:var(--muted);border-radius:10px;padding:11px 20px;
  font-size:14px;font-weight:600;cursor:pointer
}
.btn-save{
  background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer
}

/* ── Misc ────────────────────────────────────────── */
.msg-center{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:50dvh;gap:12px;
  color:var(--muted);text-align:center;padding:20px
}
.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-sec{
  padding:12px 16px;text-align:center;
  color:var(--muted);font-size:13px;font-style:italic
}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div id="topbar-av"></div>
  <div id="topbar-info">
    <div id="topbar-name">Loading…</div>
    <div id="topbar-sub"></div>
  </div>
  <button id="notif-btn" onclick="openNotifPanel()">
    <i class="ti ti-bell"></i>
    <span id="notif-badge"></span>
  </button>
</div>

<!-- Search -->
<div id="search-wrap">
  <div id="search-inner">
    <i class="ti ti-search"></i>
    <input id="search-inp" placeholder="Search tasks…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="renderAll()">
  </div>
</div>

<!-- Main content -->
<div id="content">
  <div class="msg-center">
    <i class="ti ti-loader spinning" style="font-size:32px;color:var(--accent)"></i>
    <p style="color:var(--muted)">Loading your tasks…</p>
  </div>
</div>

<!-- FAB: add personal task -->
<button id="fab" onclick="openAddTask()"><i class="ti ti-plus"></i></button>

<!-- Bottom nav (links updated after pid is known) -->
<nav id="botnav">
  <a href="#" class="bn-item active" id="nav-home"><i class="ti ti-home"></i><span>Home</span></a>
  <a href="mindmapv18.html" class="bn-item" id="nav-map"><i class="ti ti-schema"></i><span>Map</span></a>
  <a href="timeblocksv1.html" class="bn-item" id="nav-time"><i class="ti ti-clock-bolt"></i><span>Time</span></a>
  <a href="mindmapv25.html" class="bn-item" id="nav-ai"><i class="ti ti-sparkles"></i><span>AI</span></a>
</nav>

<!-- Notification panel -->
<div id="notif-overlay" onclick="closeNotifPanel()">
  <div id="notif-panel">
    <div style="padding:13px 14px;font-size:14px;font-weight:700;border-bottom:.5px solid var(--border);color:var(--text);display:flex;align-items:center;gap:8px">
      <i class="ti ti-bell" style="color:var(--accent)"></i> Notifications
    </div>
    <div id="notif-list"></div>
  </div>
</div>

<!-- Add task modal -->
<div class="add-overlay" id="add-overlay" onclick="if(event.target===this)closeAddTask()">
  <div class="add-sheet">
    <h3>Add Task</h3>
    <div class="f-lbl">Task name *</div>
    <input class="f-inp" id="add-inp" placeholder="What needs to be done?"
      autocomplete="off" onkeydown="if(event.key==='Enter'&&!event.shiftKey)saveTask()">
    <div class="f-lbl">Type</div>
    <select class="f-sel" id="add-type" onchange="onAddTypeChange()">
      <option value="personal">🧑 Personal (only me)</option>
      <option value="delegate">👥 Delegate to colleague</option>
      <option value="manager">📤 Send to Manager</option>
    </select>
    <div id="add-person-row" style="display:none">
      <div class="f-lbl">Assign to</div>
      <select class="f-sel" id="add-person"></select>
    </div>
    <div class="add-actions">
      <button class="btn-cancel" onclick="closeAddTask()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://ienfjretjvoupzwncnjb.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllbmZqcmV0anZvdXB6d25jbmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTU4NjcsImV4cCI6MjA5NzM3MTg2N30.zItQB5JjKGaM2gGR4eJWBGX4WGgvc1CEYG9Z1I7yU2A';
var LOCAL_KEY='chain_local_v1';
var STATE_ROW='main';
var db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

var D={};
var pid='';
var person=null;
var openTaskId=null;
var _ctab={};

function xe(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fts(iso){
  try{var dt=new Date(iso);return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
  catch(e){return '';}
}

/* ── Data ─────────────────────────────────────────── */
async function ld(){
  var local=localStorage.getItem(LOCAL_KEY);
  if(local){try{D=JSON.parse(local);}catch(e){D={};}}
  if(!navigator.onLine)return;
  try{
    var r=await db.from('chain_state').select('data').eq('id',STATE_ROW).maybeSingle();
    if(r.data&&r.data.data){
      var cloud=r.data.data;
      if(!D._ts||!cloud._ts||cloud._ts>=D._ts){
        D=cloud;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));
      }
    }
  }catch(e){}
}
async function sv(){
  D._ts=new Date().toISOString();
  localStorage.setItem(LOCAL_KEY,JSON.stringify(D));
  if(!navigator.onLine)return;
  try{await db.from('chain_state').upsert({id:STATE_ROW,data:D},{onConflict:'id'});}catch(e){}
}
function startRealtime(){
  db.channel('del_rt_'+pid).on('postgres_changes',
    {event:'UPDATE',schema:'public',table:'chain_state'},
    function(payload){
      var cloud=payload.new&&payload.new.data;
      if(cloud&&(!D._ts||cloud._ts>D._ts)){
        D=cloud;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));
        updateNotifBadge();renderAll();
      }
    }).subscribe();
}

/* ── Boot ─────────────────────────────────────────── */
(async function(){
  var params=new URLSearchParams(window.location.search);
  pid=params.get('pid')||'';
  if(!pid){showError('Invalid link — no person ID in URL.');return;}

  /* sessionStorage = per-tab, no cross-tab contamination with owner app */
  sessionStorage.setItem('chain_delegate_pid',pid);

  /* Update nav home links to include pid */
  document.getElementById('nav-home').href='delegate.html?pid='+pid;

  await ld();

  person=(D.people||[]).find(function(p){return p.id===pid;});
  if(!person&&navigator.onLine){
    /* Force fresh cloud load in case local cache is stale */
    try{
      var r2=await db.from('chain_state').select('data').eq('id',STATE_ROW).maybeSingle();
      if(r2.data&&r2.data.data){D=r2.data.data;localStorage.setItem(LOCAL_KEY,JSON.stringify(D));}
    }catch(e){}
    person=(D.people||[]).find(function(p){return p.id===pid;});
  }

  if(!person){
    showError('Person not found.<br>Ask your manager to copy and share your link again.');
    return;
  }

  /* Fill topbar */
  var av=document.getElementById('topbar-av');
  av.style.background=person.color||'#6B5FFF';
  av.textContent=(person.name||'?').charAt(0).toUpperCase();
  document.getElementById('topbar-name').textContent=person.name||'';
  var biz=(D.businesses||[]).find(function(b){return b.id===person.bizId;});
  var dept=(D.departments||[]).find(function(d){return d.id===person.deptId;});
  var sub=[person.role,dept&&dept.name,biz&&biz.name].filter(Boolean).join(' · ');
  document.getElementById('topbar-sub').textContent=sub||'Team Member';
  document.title=(person.name||'Employee')+' — My Tasks';

  renderAll();
  updateNotifBadge();
  if(navigator.onLine)startRealtime();
})();

function showError(msg){
  document.getElementById('content').innerHTML=
    '<div class="msg-center">'+
      '<div style="width:64px;height:64px;border-radius:32px;background:rgba(255,59,48,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">'+
        '<i class="ti ti-alert-circle" style="font-size:32px;color:var(--red)"></i>'+
      '</div>'+
      '<p style="color:var(--text);font-size:16px;font-weight:600">Something went wrong</p>'+
      '<p style="font-size:14px;line-height:1.5">'+msg+'</p>'+
    '</div>';
  document.getElementById('fab').style.display='none';
}

/* ── Task buckets ─────────────────────────────────── */
function managerTasks(){
  return (D.tasks||[]).filter(function(t){
    return !t.isPersonal&&t.assignedPersonId===pid&&t.createdBy==='owner';
  });
}
function delegatedToMeTasks(){
  return (D.tasks||[]).filter(function(t){
    return !t.isPersonal&&t.assignedPersonId===pid&&t.createdBy&&t.createdBy!=='owner'&&t.createdBy!==pid;
  });
}
function personalTasks(){
  return (D.tasks||[]).filter(function(t){
    return t.isPersonal&&t.personalOwnerId===pid;
  });
}
function iDelegatedTasks(){
  return (D.tasks||[]).filter(function(t){
    return !t.isPersonal&&t.createdBy===pid&&t.assignedPersonId&&t.assignedPersonId!==pid;
  });
}
function matchQ(t){
  var q=document.getElementById('search-inp').value.trim().toLowerCase();
  if(!q)return true;
  return (t.title||'').toLowerCase().indexOf(q)!==-1||
    (t.notes||'').toLowerCase().indexOf(q)!==-1||
    (t.steps||[]).some(function(s){return(s.text||'').toLowerCase().indexOf(q)!==-1;});
}

/* ── Render ───────────────────────────────────────── */
var SECTIONS=[
  {key:'mgr',   label:"Manager's Tasks",   icon:'📌', bg:'rgba(107,95,255,.1)',  color:'#6B5FFF'},
  {key:'del',   label:'Delegated to Me',   icon:'🤝', bg:'rgba(255,149,0,.1)',   color:'#FF9500'},
  {key:'per',   label:'My Personal',       icon:'🧑', bg:'rgba(52,199,89,.1)',   color:'#34C759'},
  {key:'idel',  label:'I Delegated',       icon:'📤', bg:'rgba(255,59,48,.1)',   color:'#FF3B30'},
];

function renderAll(){
  if(!person)return;
  var buckets={
    mgr: managerTasks().filter(matchQ),
    del: delegatedToMeTasks().filter(matchQ),
    per: personalTasks().filter(matchQ),
    idel: iDelegatedTasks().filter(matchQ)
  };
  var total=Object.values(buckets).reduce(function(a,b){return a+b.length;},0);
  var q=document.getElementById('search-inp').value.trim();
  var html='';
  if(!total){
    html='<div class="msg-center">'+
      (q?'<i class="ti ti-zoom-question" style="font-size:40px;color:var(--accent);opacity:.4"></i><p>No results for "<strong>'+xe(q)+'</strong>"</p>':
         '<i class="ti ti-checkbox" style="font-size:40px;color:var(--accent);opacity:.3"></i><p style="color:var(--text);font-weight:600">No tasks yet</p><p style="font-size:13px">Tap <strong>+</strong> to add a personal task</p>')+
    '</div>';
  } else {
    SECTIONS.forEach(function(sec){
      var tasks=buckets[sec.key];
      html+='<div class="sec-hdr">'+
        '<div class="sec-hdr-left">'+
          '<div class="sec-icon" style="background:'+sec.bg+'">'+sec.icon+'</div>'+
          '<span class="sec-title">'+xe(sec.label)+'</span>'+
        '</div>'+
        '<span class="sec-count">'+tasks.length+'</span>'+
      '</div>';
      if(!tasks.length){
        html+='<div class="empty-sec">Nothing here</div>';
      } else {
        html+='<div class="task-group">';
        html+=tasks.map(function(t){return taskCardHtml(t,sec.color);}).join('');
        html+='</div>';
      }
    });
  }
  document.getElementById('content').innerHTML=html;
  /* Restore open task */
  if(openTaskId){
    var det=document.getElementById('tc-detail-'+openTaskId);
    var chev=document.getElementById('tc-chev-'+openTaskId);
    if(det){det.style.display='';renderDetail(openTaskId);}
    if(chev)chev.classList.add('open');
  }
}

function taskCardHtml(t,accentColor){
  var steps=t.steps||[];
  var doneS=steps.filter(function(s){return s.done;}).length;
  var pct=steps.length?Math.round(doneS/steps.length*100):0;
  var cntCmts=(t.comments||[]).length;
  var toWho='';
  if(t.assignedPersonId&&t.assignedPersonId!==pid){
    if(t.assignedPersonId==='owner')toWho='→ Manager';
    else{var ap=(D.people||[]).find(function(p){return p.id===t.assignedPersonId;});if(ap)toWho='→ '+ap.name;}
  }
  var metaParts=[];
  if(steps.length)metaParts.push(pct+'% · '+doneS+'/'+steps.length+' steps');
  if(cntCmts)metaParts.push('💬 '+cntCmts);
  if(toWho)metaParts.push(toWho);
  return '<div class="task-card" id="tc-'+t.id+'">'+
    '<div class="tc-header" onclick="toggleTask(\''+t.id+'\')">'+
      '<div class="tc-check'+(t.done?' done':'')+'" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')">'+
        (t.done?'<i class="ti ti-check"></i>':'')+
      '</div>'+
      '<div class="tc-body">'+
        '<div class="tc-title'+(t.done?' done':'')+'">'+ xe(t.title)+
          (t.isPersonal?'<span class="tc-tag-personal">Personal</span>':'')+
        '</div>'+
        '<div class="tc-meta">'+(metaParts.length?metaParts.join(' · '):'No steps')+'</div>'+
        (steps.length?'<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%;background:'+accentColor+'"></div></div>':'')+
      '</div>'+
      '<i class="ti ti-chevron-right tc-chev" id="tc-chev-'+t.id+'"></i>'+
    '</div>'+
    '<div class="tc-detail" id="tc-detail-'+t.id+'" style="display:none"></div>'+
  '</div>';
}

/* ── Toggle task open ─────────────────────────────── */
function toggleTask(id){
  openTaskId=(openTaskId===id)?null:id;
  document.querySelectorAll('.tc-detail').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.tc-chev').forEach(function(el){el.classList.remove('open');});
  if(openTaskId){
    var det=document.getElementById('tc-detail-'+openTaskId);
    var chev=document.getElementById('tc-chev-'+openTaskId);
    if(det){det.style.display='';renderDetail(openTaskId);}
    if(chev)chev.classList.add('open');
  }
}
function toggleDone(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  t.done=!t.done;sv();renderAll();
}

/* ── Detail: tabs ─────────────────────────────────── */
function renderDetail(id){
  var det=document.getElementById('tc-detail-'+id);
  if(!det||det.style.display==='none')return;
  var tab=_ctab[id]||'steps';
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  var cntCmts=(t.comments||[]).length;
  det.innerHTML=
    '<div class="tabs">'+
      '<button class="tab-btn'+(tab==='steps'?' active':'')+'" onclick="setDTab(\''+id+'\',\'steps\')">Steps</button>'+
      '<button class="tab-btn'+(tab==='notes'?' active':'')+'" onclick="setDTab(\''+id+'\',\'notes\')">Notes</button>'+
      '<button class="tab-btn'+(tab==='comments'?' active':'')+'" onclick="setDTab(\''+id+'\',\'comments\')">💬'+(cntCmts?' '+cntCmts:'')+'</button>'+
    '</div>'+
    '<div class="tab-content" id="dtab-'+id+'"></div>';
  renderDTab(id,tab);
}
function setDTab(id,tab){_ctab[id]=tab;renderDetail(id);}
function renderDTab(id,tab){
  var el=document.getElementById('dtab-'+id);if(!el)return;
  if(tab==='steps')renderDSteps(id,el);
  else if(tab==='notes')renderDNotes(id,el);
  else renderDComments(id,el);
}

/* Steps */
function renderDSteps(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  var steps=t.steps||[];
  var html=(steps.length?steps.map(function(s){
    return '<div class="step-row">'+
      '<div class="step-chk'+(s.done?' done':'')+'" onclick="toggleStep(\''+id+'\',\''+s.id+'\')">'+
        (s.done?'<i class="ti ti-check"></i>':'')+
      '</div>'+
      '<span class="step-txt'+(s.done?' done':'\'")>'+xe(s.text)+'</span>'+
      '<button class="step-del" onclick="delStep(\''+id+'\',\''+s.id+'\')" title="Delete"><i class="ti ti-x"></i></button>'+
    '</div>';
  }).join(''):'<div style="color:var(--muted);font-size:13px;padding:6px 0">No steps yet</div>');
  html+='<div class="step-add-row">'+
    '<input class="step-add-inp" id="sinp-'+id+'" placeholder="Add a step…" autocomplete="off" '+
      'onkeydown="if(event.key===\'Enter\')addStep(\''+id+'\')">'+
    '<button class="step-add-btn" onclick="addStep(\''+id+'\')">Add</button>'+
  '</div>';
  el.innerHTML=html;
}
function toggleStep(tid,sid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  var s=(t.steps||[]).find(function(x){return x.id===sid;});if(!s)return;
  s.done=!s.done;sv();renderDSteps(tid,document.getElementById('dtab-'+tid));
}
function addStep(tid){
  var inp=document.getElementById('sinp-'+tid);if(!inp)return;
  var txt=inp.value.trim();if(!txt)return;
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  if(!t.steps)t.steps=[];
  t.steps.push({id:uid(),text:txt,done:false,tags:[]});
  sv();inp.value='';renderDSteps(tid,document.getElementById('dtab-'+tid));
}
function delStep(tid,sid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  t.steps=(t.steps||[]).filter(function(s){return s.id!==sid;});
  sv();renderDSteps(tid,document.getElementById('dtab-'+tid));
}

/* Notes */
function renderDNotes(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  el.innerHTML='<textarea class="notes-ta" id="nta-'+id+'" placeholder="Write notes…">'+xe(t.notes||'')+'</textarea>'+
    '<button class="save-btn" onclick="saveNotes(\''+id+'\')">Save Notes</button>';
}
function saveNotes(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  var ta=document.getElementById('nta-'+id);
  if(!t||!ta)return;t.notes=ta.value;sv();
}

/* Comments */
function renderDComments(id,el){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});if(!t)return;
  var cmts=t.comments||[];
  var avInit=(person.name||'?').charAt(0).toUpperCase();
  var avColor=person.color||'var(--accent)';
  var html='<div class="cmts-wrap">'+
    '<div class="cmt-add-row">'+
      '<div class="cmt-av" style="background:'+avColor+'">'+xe(avInit)+'</div>'+
      '<textarea class="cmt-inp" id="cinp-'+id+'" placeholder="Write a comment…" rows="1" onkeydown="cmtKey(event,\''+id+'\')"></textarea>'+
      '<button class="cmt-send" onclick="sendComment(\''+id+'\')">Send</button>'+
    '</div>';
  if(!cmts.length){
    html+='<div class="cmt-empty"><i class="ti ti-message-circle" style="font-size:28px;opacity:.3;display:block;margin-bottom:6px"></i>No comments yet</div>';
  } else {
    html+=cmts.slice().reverse().map(function(c){
      var isOwner=c.pid==='owner';
      var cAvColor=isOwner?'#6B5FFF':avColor;
      var cAvTxt=isOwner?'M':xe(avInit);
      return '<div class="cmt-bubble">'+
        '<div class="cmt-meta">'+
          '<div class="cmt-av" style="background:'+cAvColor+';font-size:11px">'+cAvTxt+'</div>'+
          '<span class="cmt-name">'+xe(isOwner?'Manager':c.pname||'')+'</span>'+
          '<span class="cmt-ts">'+fts(c.ts)+'</span>'+
          (!isOwner?'<button class="cmt-flag-btn" onclick="flagComment(\''+id+'\',\''+c.id+'\')" title="Flag for attention">'+(c.flagged?'❓':'🏳')+'</button>':'')+
        '</div>'+
        '<div class="cmt-text">'+xe(c.text)+'</div>'+
      '</div>';
    }).join('');
  }
  html+='</div>';el.innerHTML=html;
}
function cmtKey(e,id){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendComment(id);}}
function sendComment(id){
  var t=(D.tasks||[]).find(function(x){return x.id===id;});
  var inp=document.getElementById('cinp-'+id);
  if(!t||!inp)return;
  var txt=inp.value.trim();if(!txt)return;
  if(!t.comments)t.comments=[];
  t.comments.push({id:uid(),pid:pid,pname:person.name,text:txt,ts:new Date().toISOString(),flagged:false});
  addOwnerNotif('comment_added',t.id,t.title);
  sv();inp.value='';renderDComments(id,document.getElementById('dtab-'+id));
}
function flagComment(tid,cid){
  var t=(D.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  var c=(t.comments||[]).find(function(x){return x.id===cid;});if(!c)return;
  c.flagged=!c.flagged;
  if(c.flagged)addOwnerNotif('task_flagged',t.id,t.title);
  sv();renderDComments(tid,document.getElementById('dtab-'+tid));
}

/* ── Add task ─────────────────────────────────────── */
function openAddTask(){
  document.getElementById('add-inp').value='';
  document.getElementById('add-type').value='personal';
  onAddTypeChange();
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('add-inp').focus();},120);
}
function closeAddTask(){document.getElementById('add-overlay').classList.remove('open');}
function onAddTypeChange(){
  var type=document.getElementById('add-type').value;
  var row=document.getElementById('add-person-row');
  row.style.display=(type==='delegate')?'block':'none';
  if(type==='delegate'){
    var others=(D.people||[]).filter(function(p){return p.id!==pid;});
    document.getElementById('add-person').innerHTML=
      '<option value="">— Select person —</option>'+
      others.map(function(p){
        return '<option value="'+p.id+'">'+xe(p.name)+(p.role?' ('+xe(p.role)+')':'')+'</option>';
      }).join('');
  }
}
function saveTask(){
  var name=document.getElementById('add-inp').value.trim();if(!name)return;
  var type=document.getElementById('add-type').value;
  var task={id:uid(),title:name,createdBy:pid,done:false,notes:'',
    createdAt:new Date().toISOString(),steps:[],tags:[],comments:[],
    projectId:null,dueDate:null,goalId:null,categoryId:null,
    target:'',preparation:'',bizId:null};
  if(type==='personal'){
    task.isPersonal=true;task.personalOwnerId=pid;task.assignedPersonId=pid;
  } else if(type==='delegate'){
    var assignTo=document.getElementById('add-person').value;
    if(!assignTo){alert('Please select a person.');return;}
    task.isPersonal=false;task.personalOwnerId=null;task.assignedPersonId=assignTo;
    task.assignee=((D.people||[]).find(function(p){return p.id===assignTo;})||{}).name||'';
    addPersonNotif(assignTo,'task_assigned',task.id,name);
  } else {
    task.isPersonal=false;task.personalOwnerId=null;task.assignedPersonId='owner';
    task.assignee='Manager';
    addOwnerNotif('task_assigned',task.id,name);
  }
  if(!D.tasks)D.tasks=[];
  D.tasks.unshift(task);
  sv();closeAddTask();renderAll();
}

/* ── Notifications ────────────────────────────────── */
function addOwnerNotif(type,taskId,taskTitle){
  if(!D.notifications)D.notifications=[];
  D.notifications.unshift({id:uid(),toId:'owner',fromPid:pid,type:type,
    taskId:taskId,taskTitle:taskTitle,fromName:person.name,
    ts:new Date().toISOString(),readBy:[]});
}
function addPersonNotif(toPid,type,taskId,taskTitle){
  if(!D.notifications)D.notifications=[];
  D.notifications.unshift({id:uid(),toId:toPid,fromPid:pid,type:type,
    taskId:taskId,taskTitle:taskTitle,fromName:person.name,
    ts:new Date().toISOString(),readBy:[]});
}
function myUnreadCount(){
  return (D.notifications||[]).filter(function(n){
    return n.toId===pid&&!(n.readBy||[]).includes(pid);
  }).length;
}
function updateNotifBadge(){
  var cnt=myUnreadCount();
  var badge=document.getElementById('notif-badge');if(!badge)return;
  if(cnt>0){badge.style.display='';badge.textContent=cnt>9?'9+':cnt;}
  else badge.style.display='none';
}
function openNotifPanel(){
  var list=document.getElementById('notif-list');
  var notifs=(D.notifications||[]).filter(function(n){return n.toId===pid;}).slice(0,30);
  if(!notifs.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">'+
      '<i class="ti ti-bell-off" style="font-size:28px;opacity:.4;display:block;margin-bottom:8px"></i>No notifications yet</div>';
  } else {
    list.innerHTML=notifs.map(function(n){
      var unread=!(n.readBy||[]).includes(pid);
      var icon=n.type==='task_assigned'?'📌':n.type==='comment_added'?'💬':'❓';
      return '<div class="notif-item" style="'+(unread?'background:rgba(107,95,255,.05)':'')+'"'+
        ' onclick="closeNotifPanel();'+(n.taskId?'openTaskById(\''+n.taskId+'\')':'')+'">' +
        '<div style="font-size:13px;font-weight:600;color:var(--text)">'+icon+' '+xe(n.fromName||'Manager')+' — '+xe(n.taskTitle||'')+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+n.type.replace(/_/g,' ')+' · '+fts(n.ts)+'</div>'+
      '</div>';
    }).join('');
  }
  var changed=false;
  (D.notifications||[]).forEach(function(n){
    if(n.toId===pid&&!(n.readBy||[]).includes(pid)){n.readBy.push(pid);changed=true;}
  });
  if(changed){sv();updateNotifBadge();}
  document.getElementById('notif-overlay').style.display='';
}
function closeNotifPanel(){document.getElementById('notif-overlay').style.display='none';}
function openTaskById(id){
  openTaskId=id;renderAll();
  setTimeout(function(){var el=document.getElementById('tc-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},150);
}
</script>
</body>
</html>
