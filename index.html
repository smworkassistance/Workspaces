<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F2F2F7">
<title>Chain v16</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* в”Ђв”Ђ Reset в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* в”Ђв”Ђ iOS Design Tokens в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
:root{
  /* App accent */
  --accent:#7C6FFF;
  --accent-soft:rgba(124,111,255,.1);
  --accent-mid:rgba(124,111,255,.35);
  /* iOS system greens/reds */
  --green:#34C759;
  --green-soft:rgba(52,199,89,.12);
  --red:#FF3B30;
  --red-soft:rgba(255,59,48,.1);
  --amber:#FF9500;
  --amber-soft:rgba(255,149,0,.12);
  /* iOS surface */
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --surface2:#F2F2F7;
  --border:rgba(60,60,67,.18);
  --border-strong:rgba(60,60,67,.29);
  /* iOS labels */
  --text:rgba(0,0,0,.87);
  --muted:rgba(60,60,67,.60);
  --muted2:rgba(60,60,67,.30);
  /* Radius */
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  /* Font */
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',sans-serif;
}

/* в”Ђв”Ђ PWA Fixed Layout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
html{
  height:100%;height:100dvh;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  /* Fixed to prevent iOS rubber-band overscroll */
  position:fixed;width:100%;
  height:100%;height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  font-size:17px;
  -webkit-font-smoothing:antialiased;
}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* в”Ђв”Ђ Topbar (iOS Nav Bar) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#topbar{
  display:flex;align-items:flex-end;gap:10px;
  padding:0 12px 0;
  padding-top:env(safe-area-inset-top,0px);
  height:calc(44px + env(safe-area-inset-top,0px));
  background:rgba(242,242,247,.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid var(--border-strong);
  flex-shrink:0;z-index:50;
}
/* Inner row fills the 44px bar at bottom of topbar */
#topbar-inner{
  display:flex;align-items:center;gap:8px;
  width:100%;height:44px;
}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{
  width:28px;height:28px;background:var(--accent);
  border-radius:8px;display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:15px;flex-shrink:0;
}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.02em}
#badges{display:flex;gap:5px;flex:1;align-items:center}
.badge{
  padding:2px 8px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.badge-active{background:var(--accent);color:#fff}
.badge-done{background:var(--green-soft);color:var(--green)}
#sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:#ccc;flex-shrink:0;transition:background .3s;
}
#sync-dot.ok     {background:var(--green)}
#sync-dot.saving {background:var(--amber)}
#sync-dot.local  {background:var(--amber);animation:pulse-dot 1.2s infinite}
#sync-dot.err    {background:var(--red)}
#sync-dot.offline{background:var(--red)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}

/* в”Ђв”Ђ Floating Action Button в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#fab{
  position:fixed;
  bottom:calc(49px + env(safe-area-inset-bottom,0px) + 14px);
  right:16px;z-index:45;
  width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  font-size:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(124,111,255,.45);
  cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s,box-shadow .12s;
}
#fab:active{transform:scale(.91);box-shadow:0 2px 8px rgba(124,111,255,.35)}

/* в”Ђв”Ђ Bottom Nav в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  height:calc(49px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(242,242,247,.95);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid rgba(60,60,67,.18);
  display:flex;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
  color:rgba(60,60,67,.4);text-decoration:none;
  font-size:10px;font-weight:600;letter-spacing:.02em;
  padding-top:6px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.bn-item i{font-size:23px;line-height:1}
.bn-item.active{color:var(--accent)}

/* в”Ђв”Ђ Main layout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#main{display:flex;flex:1;overflow:hidden;min-height:0;
  padding-bottom:calc(49px + env(safe-area-inset-bottom,0px))}
#sidebar{
  width:260px;flex-shrink:0;
  background:var(--bg);
  border-right:0.5px solid var(--border-strong);
  display:flex;flex-direction:column;
}
#detail{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--surface);
}
.detail-inner{
  padding:20px 20px;
  max-width:700px;
  padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));
}

/* в”Ђв”Ђ Search bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#search-bar{
  padding:8px 10px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
#search-input{
  width:100%;box-sizing:border-box;
  padding:7px 12px;border-radius:10px;
  border:none;background:rgba(118,118,128,.12);
  font-size:14px;font-family:var(--font);color:var(--text);
  outline:none;-webkit-appearance:none;
}
#search-input::placeholder{color:var(--muted)}

/* в”Ђв”Ђ Task list area в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#task-list{padding:6px 0;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* в”Ђв”Ђ Collapsible project groups в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.proj-group{margin-bottom:2px}
.proj-group-hdr{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px 7px;cursor:pointer;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.proj-group-hdr:active{background:rgba(0,0,0,.03)}
.proj-group-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.proj-group-name{
  flex:1;font-size:15px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.proj-group-count{font-size:11px;color:var(--muted);font-weight:600}
.proj-chev{
  font-size:14px;color:var(--muted);flex-shrink:0;
  transition:transform .18s;
}
.proj-chev.open{transform:rotate(90deg)}
.proj-group-tasks{padding:0 0 6px}

/* в”Ђв”Ђ FAB action menu в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#fab-menu{
  position:fixed;
  bottom:calc(49px + env(safe-area-inset-bottom,0px) + 76px);
  right:16px;z-index:46;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
  pointer-events:none;opacity:0;
  transition:opacity .18s,transform .18s;
  transform:translateY(8px);
}
#fab-menu.open{pointer-events:auto;opacity:1;transform:translateY(0)}
.fab-menu-btn{
  display:flex;align-items:center;gap:9px;
  background:var(--surface);border:none;border-radius:20px;
  padding:9px 16px 9px 12px;
  font-size:14px;font-weight:700;font-family:var(--font);color:var(--text);
  box-shadow:0 3px 16px rgba(0,0,0,.15);cursor:pointer;
  touch-action:manipulation;white-space:nowrap;
}
.fab-menu-btn:active{opacity:.75}
.fab-menu-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#fab-overlay{
  display:none;position:fixed;inset:0;z-index:44;
}
#fab-overlay.open{display:block}

/* в”Ђв”Ђ Grouped task rows в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.task-section{margin-bottom:8px}
.sect-hdr{
  display:flex;align-items:center;gap:6px;
  padding:10px 4px 4px;
  font-size:13px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);
}
.sect-hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sect-tasks{
  border-radius:var(--r-md);overflow:hidden;
  border:0.5px solid var(--border-strong);
}
/* в”Ђв”Ђ Focus mode segment control в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#focus-seg{
  display:flex;margin:0 10px 6px;
  background:rgba(60,60,67,.08);border-radius:10px;padding:2px;gap:2px;flex-shrink:0;
}
.seg-btn{
  flex:1;border:none;border-radius:8px;padding:6px 4px;
  font-size:12px;font-weight:700;font-family:var(--font);
  cursor:pointer;color:var(--muted);background:transparent;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;
}
.seg-btn i{font-size:14px}
.seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* в”Ђв”Ђ Focus list items в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.focus-item{
  display:flex;align-items:center;gap:6px;
  padding:10px 10px;border-bottom:.5px solid var(--border);
  background:var(--surface);
}
.focus-item.focus-done .focus-name{text-decoration:line-through;color:var(--muted)}
.focus-move{display:flex;flex-direction:column;gap:0}
.focus-arrow{
  background:none;border:none;cursor:pointer;color:var(--muted);
  padding:3px 6px;font-size:15px;touch-action:manipulation;border-radius:5px;
  -webkit-tap-highlight-color:transparent;line-height:1;
}
.focus-arrow:active{background:var(--bg);color:var(--text)}
.focus-arrow:disabled{opacity:.22;cursor:default}
.focus-body{flex:1;min-width:0;cursor:pointer;padding:0 4px}
.focus-body:active{opacity:.7}
.focus-type-badge{
  font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  border-radius:5px;padding:1px 6px;display:inline-block;margin-bottom:3px;
}
.focus-type-task   {color:#007AFF;background:rgba(0,122,255,.1)}
.focus-type-project{color:#FF9500;background:rgba(255,149,0,.1)}
.focus-type-step   {color:#34C759;background:rgba(52,199,89,.1)}
.focus-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.focus-sub{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.focus-rm{
  background:none;border:none;cursor:pointer;color:rgba(60,60,67,.28);
  padding:5px;font-size:18px;touch-action:manipulation;border-radius:6px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;line-height:1;
}
.focus-rm:active{background:rgba(255,59,48,.1);color:#FF3B30}

/* в”Ђв”Ђ Step edit modal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#step-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;align-items:flex-end;justify-content:center;z-index:200}
#step-modal-overlay.open{display:flex}
#step-modal{background:var(--surface);width:100%;max-width:480px;
  border-radius:18px 18px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  max-height:80vh;overflow-y:auto}
#step-modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
#step-modal label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-top:10px;display:block;margin-bottom:4px}
#step-modal input{width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:9px 12px;font-size:15px;font-family:var(--font);background:var(--bg);
  color:var(--text);box-sizing:border-box}
#step-modal input:focus{outline:none;border-color:var(--accent)}

/* в”Ђв”Ђ Step tag badges in step rows в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.step-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.step-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:800;
  letter-spacing:.04em;border-radius:4px;padding:1px 5px}

/* в”Ђв”Ђ Alive project view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.proj-view-hdr{display:flex;align-items:center;gap:10px;padding:14px 14px 8px;flex-shrink:0}
.proj-view-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.proj-view-name{font-size:19px;font-weight:800;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-view-act{display:flex;gap:6px}
.proj-view-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 8px}
.proj-view-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:10px;font-size:11px;font-weight:700}
.proj-view-stats{display:flex;gap:0;border-top:.5px solid var(--border);
  border-bottom:.5px solid var(--border);flex-shrink:0}
.proj-view-stat{flex:1;text-align:center;padding:10px 0}
.proj-view-stat-n{font-size:22px;font-weight:800;line-height:1}
.proj-view-stat-l{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}
.proj-view-prog{height:3px;background:rgba(60,60,67,.1);margin:0;flex-shrink:0}
.proj-view-prog-fill{height:100%;border-radius:0;transition:width .3s}
.proj-view-add-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;
  border-bottom:.5px solid var(--border);cursor:pointer;color:var(--accent);
  font-size:14px;font-weight:700;background:none;border-left:none;border-right:none;
  border-top:none;font-family:var(--font);width:100%;text-align:left;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.proj-view-add-btn:active{background:rgba(0,122,255,.06)}
.proj-task-block{border-bottom:.5px solid var(--border)}
.proj-task-row{display:flex;align-items:center;gap:0;background:var(--surface)}
.proj-task-check{width:40px;height:44px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.proj-task-check .ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.proj-task-check .ck.done{background:var(--green);border-color:var(--green);color:#fff}
.proj-task-check .ck i{font-size:11px}
.proj-task-body{flex:1;min-width:0;padding:8px 0;cursor:pointer;touch-action:manipulation}
.proj-task-name{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.proj-task-name.done{text-decoration:line-through;color:var(--muted)}
.proj-task-meta{font-size:11px;color:var(--muted);margin-top:1px;display:flex;
  align-items:center;flex-wrap:wrap;gap:2px}
.proj-task-acts{display:flex;gap:2px;padding-right:8px;flex-shrink:0}
.proj-task-btn{border:none;background:none;color:var(--muted);cursor:pointer;
  padding:6px;border-radius:6px;font-size:16px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;line-height:1}
.proj-task-btn:active{background:rgba(60,60,67,.08);color:var(--text)}
.proj-task-btn.danger:active{background:rgba(255,59,48,.1);color:#FF3B30}
.proj-task-btn.pin-on{color:#FF9500}
.proj-steps-block{background:var(--bg);padding:2px 12px 6px 42px}
.proj-step-row{display:flex;align-items:center;gap:6px;padding:6px 0;
  border-bottom:.5px solid rgba(60,60,67,.08)}
.proj-step-row:last-child{border-bottom:none}
.proj-step-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;touch-action:manipulation;transition:all .15s}
.proj-step-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.proj-step-chk i{font-size:10px}
.proj-step-body{flex:1;min-width:0}
.proj-step-text{font-size:13px;color:var(--text)}
.proj-step-text.done{text-decoration:line-through;color:var(--muted)}
.proj-step-deleg{font-size:10px;color:var(--amber);margin-top:1px}
.proj-step-acts{display:flex;gap:1px;flex-shrink:0}
.proj-step-btn{border:none;background:none;color:var(--muted);cursor:pointer;
  padding:4px 5px;border-radius:5px;font-size:14px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;line-height:1}
.proj-step-btn:active{background:rgba(60,60,67,.08)}
.proj-step-btn.pin-on{color:#FF9500}
.proj-step-btn.del:active{background:rgba(255,59,48,.1);color:#FF3B30}
.proj-add-step{display:flex;align-items:center;gap:6px;padding:4px 0 6px 42px;background:var(--bg)}
.proj-add-step input{flex:1;border:1px solid var(--border);border-radius:8px;
  padding:5px 9px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text)}
.proj-add-step input:focus{outline:none;border-color:var(--accent)}
.proj-add-step button{border:none;background:var(--accent);color:#fff;border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);
  touch-action:manipulation;white-space:nowrap}
.proj-notes-section{padding:12px 14px;border-top:.5px solid var(--border)}
.proj-notes-section label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px}

/* в”Ђв”Ђ Goals management modal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#goal-modal-overlay,#cat-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;align-items:flex-end;justify-content:center;z-index:200}
#goal-modal-overlay.open,#cat-modal-overlay.open{display:flex}
#goal-modal,#cat-modal{background:var(--surface);width:100%;max-width:480px;
  border-radius:18px 18px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  max-height:80vh;overflow-y:auto}
#goal-modal h3,#cat-modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
#goal-modal label,#cat-modal label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-top:10px;display:block;margin-bottom:4px}
#goal-modal input,#cat-modal input{width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:9px 12px;font-size:15px;font-family:var(--font);background:var(--bg);
  color:var(--text);box-sizing:border-box}
#goal-modal input:focus,#cat-modal input:focus{outline:none;border-color:var(--accent)}

/* в”Ђв”Ђ Goals view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.goals-hdr{display:flex;align-items:center;padding:10px 14px 6px;flex-shrink:0}
.goals-hdr-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);flex:1}
.goals-manage-btn{background:none;border:none;color:var(--accent);font-size:22px;
  cursor:pointer;padding:2px;touch-action:manipulation;border-radius:6px;line-height:1}
.goal-card{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:.5px solid var(--border);cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;background:var(--surface);transition:background .12s}
.goal-card:active,.goal-card.active{background:var(--bg)}
.goal-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.goal-card-name{font-size:15px;font-weight:700;flex:1;color:var(--text)}
.goal-card-count{font-size:11px;font-weight:700;color:var(--muted);
  background:rgba(60,60,67,.1);border-radius:10px;padding:1px 8px}
.goal-card .ti-chevron-right{color:var(--muted);font-size:14px;flex-shrink:0}
.goal-filtered-hdr{padding:6px 14px 4px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  border-top:.5px solid var(--border)}

/* в”Ђв”Ђ Categories view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.cats-grid{display:flex;flex-wrap:wrap;gap:7px;padding:4px 14px 10px}
.cat-card{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:14px;
  border:1.5px solid var(--tc,#ccc);background:transparent;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--tc,#666);touch-action:manipulation;
  font-family:var(--font);-webkit-tap-highlight-color:transparent;transition:all .15s}
.cat-card:active,.cat-card.active{background:var(--tc,#ccc);color:#fff}
.cat-card .tc-dot{width:7px;height:7px;border-radius:50%;background:var(--tc);flex-shrink:0}
.cat-card.active .tc-dot{background:#fff}
.cat-card .tc-count{font-size:9px;opacity:.75;margin-left:1px}

/* в”Ђв”Ђ Goal/Category label chips on rows в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.gc-chip{display:inline-flex;align-items:center;font-size:9px;font-weight:800;
  letter-spacing:.03em;border-radius:4px;padding:1px 5px;margin-right:2px;
  vertical-align:middle}

/* в”Ђв”Ђ Desktop project row edit/delete buttons в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.proj-hdr-acts{display:flex;gap:2px;flex-shrink:0}
.proj-hdr-btn{border:none;background:none;color:var(--muted);cursor:pointer;
  padding:5px 6px;border-radius:6px;font-size:15px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;line-height:1}
.proj-hdr-btn:active{background:rgba(60,60,67,.1);color:var(--text)}
.proj-hdr-btn.del:active{color:#FF3B30;background:rgba(255,59,48,.08)}

/* в”Ђв”Ђ Alive focus rows в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.focus-row-wrap{display:flex;align-items:stretch;border-bottom:.5px solid var(--border)}
.focus-ctrl{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:30px;background:var(--bg);flex-shrink:0;border-right:.5px solid var(--border)}
.focus-num{font-size:9px;font-weight:800;color:var(--accent);line-height:1;margin:1px 0}
.focus-arrow{border:none;background:none;padding:3px 5px;color:var(--muted);cursor:pointer;
  font-size:14px;touch-action:manipulation;border-radius:3px;line-height:1;
  -webkit-tap-highlight-color:transparent}
.focus-arrow:active{background:rgba(60,60,67,.1);color:var(--text)}
.focus-arrow:disabled{opacity:.2;cursor:default}
.focus-main{flex:1;min-width:0}
.focus-main .sw-wrap{border-bottom:none}
.focus-proj-row{display:flex;align-items:center;gap:8px;padding:10px 10px;cursor:pointer;
  background:var(--surface);touch-action:manipulation}
.focus-proj-row:active{background:var(--bg)}
.focus-step-row{display:flex;align-items:center;gap:8px;padding:10px 10px;cursor:pointer;
  background:var(--surface);touch-action:manipulation}
.focus-step-row:active{background:var(--bg)}
.focus-step-name{font-size:14px;font-weight:600;flex:1;color:var(--text)}
.focus-step-parent{font-size:11px;color:var(--muted)}
.focus-deleted{padding:10px 14px;font-size:12px;color:var(--muted);font-style:italic}

/* в”Ђв”Ђ Tag chips on task rows в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.task-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:800;
  letter-spacing:.04em;border-radius:4px;padding:1px 5px;margin-left:3px;
  vertical-align:middle}

/* в”Ђв”Ђ Tags view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.tags-hdr{display:flex;align-items:center;padding:10px 14px 6px;flex-shrink:0}
.tags-hdr-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);flex:1}
.tags-manage-btn{background:none;border:none;color:var(--accent);font-size:22px;
  cursor:pointer;padding:2px;touch-action:manipulation;border-radius:6px;line-height:1}
.tags-grid{display:flex;flex-wrap:wrap;gap:7px;padding:4px 14px 12px}
.tag-card{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:14px;
  border:1.5px solid var(--tc,#ccc);background:transparent;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--tc,#666);touch-action:manipulation;
  font-family:var(--font);-webkit-tap-highlight-color:transparent;transition:all .15s}
.tag-card:active,.tag-card.active{background:var(--tc,#ccc);color:#fff}
.tag-card .tc-dot{width:7px;height:7px;border-radius:50%;background:var(--tc,#ccc);flex-shrink:0}
.tag-card.active .tc-dot{background:#fff}
.tag-card .tc-count{font-size:9px;opacity:.75;margin-left:1px}
.tags-filtered-hdr{padding:6px 14px 4px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  border-top:.5px solid var(--border)}

/* в”Ђв”Ђ People / Delegation view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.person-group{margin-bottom:1px}
.person-group-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg)}
.person-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.person-name{font-size:15px;font-weight:700;flex:1;color:var(--text)}
.person-count{font-size:11px;font-weight:700;color:var(--muted);
  background:rgba(60,60,67,.1);border-radius:10px;padding:1px 8px}
.person-item{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:.5px solid var(--border);background:var(--surface);
  cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.person-item:active{background:var(--bg)}
.pi-badge{font-size:9px;font-weight:800;letter-spacing:.06em;border-radius:4px;
  padding:1px 5px;flex-shrink:0;text-transform:uppercase}
.pi-task{background:rgba(0,122,255,.1);color:#007AFF}
.pi-step{background:rgba(52,199,89,.1);color:#34C759}
.pi-main{flex:1;min-width:0}
.pi-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.pi-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pi-status{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.pi-done{color:var(--green)}

/* в”Ђв”Ђ Tag modal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#tag-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;align-items:flex-end;justify-content:center;z-index:200}
#tag-modal-overlay.open{display:flex}
#tag-modal{background:var(--surface);width:100%;max-width:480px;
  border-radius:18px 18px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  max-height:80vh;overflow-y:auto}
#tag-modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
.tag-list-row{display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:.5px solid var(--border)}
.tag-list-row:last-child{border-bottom:none}
.tag-list-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.tag-list-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.tag-del-btn{background:none;border:none;color:rgba(60,60,67,.3);cursor:pointer;
  font-size:18px;padding:2px 4px;border-radius:4px;touch-action:manipulation}
.tag-del-btn:active{color:#FF3B30}
.color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;touch-action:manipulation;flex-shrink:0;transition:transform .1s}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15)}

/* в”Ђв”Ђ Tag picker in task modal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.tag-sel-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;
  border-radius:12px;border:1.5px solid var(--tc,#ccc);background:transparent;
  color:var(--tc,#666);font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tag-sel-chip.selected{background:var(--tc,#ccc);color:#fff}

/* в”Ђв”Ђ Pin button в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.tr-pin{
  background:none;border:none;cursor:pointer;
  color:rgba(60,60,67,.22);padding:4px;font-size:17px;
  touch-action:manipulation;border-radius:5px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;line-height:1;transition:color .15s;
}
.tr-pin.pinned{color:#FF9500}
.tr-pin:active{color:#FF9500}

/* в”Ђв”Ђ iOS-style swipe to reveal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.sw-wrap{position:relative;overflow:hidden}
.sw-btns{
  position:absolute;right:0;top:0;bottom:0;
  display:flex;z-index:0;
}
.sw-btn{
  width:68px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  border:none;cursor:pointer;font-size:11px;font-weight:700;
  font-family:var(--font);color:#fff;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;letter-spacing:.02em;
}
.sw-btn i{font-size:20px}
.sw-edit{background:#007AFF}
.sw-del {background:#FF3B30}
.sw-inner{transform:translateX(0);position:relative;z-index:1;background:var(--surface)}

.task-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px 10px 10px;
  min-height:48px;
  cursor:pointer;background:var(--surface);
  border-bottom:0.5px solid var(--border);
  transition:background .1s;position:relative;
  touch-action:manipulation;
}
.task-row:last-child{border-bottom:none}
.task-row:active{background:rgba(0,0,0,.04)}
.task-row.tr-active{background:rgba(124,111,255,.06)}
.task-row.tr-done{opacity:.45}
.tr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tr-body{flex:1;min-width:0}
.tr-name{
  font-size:17px;font-weight:500;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);
}
.tr-name.expanded{
  white-space:normal;overflow:visible;text-overflow:clip;
}
.tr-meta{
  font-size:13px;color:var(--muted);
  margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tr-prog{
  width:36px;height:3px;background:rgba(60,60,67,.12);
  border-radius:2px;flex-shrink:0;overflow:hidden;
}
.tr-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .2s}
.tr-fill.tr-fill-done{background:var(--green)}
.tr-check{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid rgba(60,60,67,.25);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:11px;flex-shrink:0;
  transition:all .15s;padding:0;
  touch-action:manipulation;
}
.tr-check:active{opacity:.7}
.tr-check.tr-checked{
  border-color:var(--green);background:var(--green);color:#fff;
}
.tr-chev{
  display:none;color:var(--muted2);
  font-size:14px;flex-shrink:0;
}

/* в”Ђв”Ђ Detail header в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.detail-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;margin-bottom:10px;
}
.detail-title{
  font-size:20px;font-weight:600;
  letter-spacing:-.02em;flex:1;
  word-break:break-word;line-height:1.25;
}
.detail-actions{display:flex;gap:2px;flex-shrink:0}
.detail-meta{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;flex-wrap:wrap;
}
.detail-prog{
  flex:1;min-width:80px;height:4px;
  background:rgba(60,60,67,.12);border-radius:2px;overflow:hidden;
}
.detail-pct{
  font-size:13px;font-weight:500;color:var(--muted);
  min-width:32px;text-align:right;
}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .25s}
.prog-fill.done-fill{background:var(--green)}

/* в”Ђв”Ђ Chips / Tags в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.chip{
  font-size:12px;font-weight:500;
  padding:2px 8px;border-radius:6px;
  display:inline-flex;align-items:center;gap:3px;
}
.chip-steps{background:var(--accent-soft);color:var(--accent)}
.chip-assignee{background:var(--amber-soft);color:var(--amber)}
.proj-tag{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:6px;color:#fff;
  display:inline-flex;align-items:center;gap:3px;
}

/* в”Ђв”Ђ Icon buttons в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.btn-icon{
  width:34px;height:34px;border:none;
  background:transparent;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:17px;
  transition:background .12s,color .12s;
  flex-shrink:0;padding:0;touch-action:manipulation;
}
.btn-icon:hover{background:rgba(0,0,0,.06);color:var(--text)}
.btn-icon:active{opacity:.6}
.btn-icon.danger:hover{background:var(--red-soft);color:var(--red)}
.btn-icon.success{color:var(--green)}

/* в”Ђв”Ђ Tabs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.tabs{
  display:flex;
  border-bottom:0.5px solid var(--border-strong);
  margin-bottom:16px;gap:0;
}
.tab-btn{
  padding:10px 18px;background:none;border:none;
  border-bottom:2px solid transparent;
  font-size:15px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:color .12s,border-color .12s;
  margin-bottom:-1px;font-family:var(--font);
  touch-action:manipulation;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:active{opacity:.7}

/* в”Ђв”Ђ Steps в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.steps-list{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.step-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 8px;border-radius:var(--r-sm);
  border:1.5px solid transparent;
  transition:background .12s,border-color .12s;
  position:relative;
}
.step-row:hover{background:var(--bg)}
.step-row.curr{background:var(--accent-soft);border-color:var(--accent-mid)}
.step-row.done{opacity:.45}
.step-grip{
  cursor:grab;color:var(--muted);font-size:15px;
  opacity:0;transition:opacity .12s;
  padding-top:2px;flex-shrink:0;line-height:1;
}
.step-row:hover .step-grip{opacity:.7}
.step-check{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid rgba(60,60,67,.3);background:#fff;
  cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:border-color .12s,background .12s;
  touch-action:manipulation;
}
.step-check:hover,.step-check:active{border-color:var(--accent)}
.step-check.checked{border-color:var(--green);background:var(--green);color:#fff}
.step-check.curr-check{border-color:var(--accent);border-width:2px}
.step-body{flex:1;min-width:0}
.step-text{font-size:15px;line-height:1.4;word-break:break-word}
.step-row.done .step-text{text-decoration:line-through}
.step-deleg{
  font-size:12px;color:var(--amber);
  display:flex;align-items:center;gap:3px;margin-top:2px;
}
.step-acts{
  display:flex;gap:2px;
  opacity:0;transition:opacity .12s;
  align-items:center;flex-shrink:0;
}
.step-row:hover .step-acts{opacity:1}
.step-btn{
  width:30px;height:30px;border:none;background:transparent;
  border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:15px;
  transition:background .12s,color .12s;padding:0;
  touch-action:manipulation;
}
.step-btn:hover{background:rgba(0,0,0,.06);color:var(--text)}
.step-btn:active{opacity:.6}
.step-btn.danger:hover{background:var(--red-soft);color:var(--red)}

/* в”Ђв”Ђ Substeps в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.sub-area{padding-left:30px;padding-bottom:4px}
.sub-list{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.sub-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px;background:var(--bg);
  border-radius:8px;font-size:13px;
}
.sub-check{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid rgba(60,60,67,.3);background:#fff;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;transition:border-color .12s,background .12s;
  touch-action:manipulation;
}
.sub-check:active{opacity:.6}
.sub-check.checked{border-color:var(--green);background:var(--green);color:#fff}
.sub-text{flex:1;font-size:14px;word-break:break-word}
.sub-text.done{text-decoration:line-through;opacity:.5}
.sub-del{
  width:22px;height:22px;border:none;background:transparent;
  cursor:pointer;color:var(--muted2);font-size:13px;
  border-radius:6px;display:flex;align-items:center;
  justify-content:center;transition:background .12s,color .12s;padding:0;
  touch-action:manipulation;
}
.sub-del:hover{background:var(--red-soft);color:var(--red)}
.add-sub{display:flex;gap:8px}
.add-sub input{
  flex:1;font-size:15px;padding:6px 10px;
  border:1px solid var(--border-strong);border-radius:8px;
  outline:none;font-family:var(--font);background:#fff;color:var(--text);
}
.add-sub input:focus{border-color:var(--accent)}
.add-sub button{
  padding:6px 12px;font-size:13px;
  background:var(--accent-soft);color:var(--accent);
  border:none;border-radius:8px;cursor:pointer;
  font-weight:500;font-family:var(--font);
  touch-action:manipulation;
}
.add-sub button:active{opacity:.7}

/* в”Ђв”Ђ Add step в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.add-step-box{
  border:1.5px dashed var(--border-strong);
  border-radius:var(--r-md);padding:10px 14px;
  display:flex;gap:10px;align-items:center;
  transition:border-color .12s;margin-top:4px;
}
.add-step-box:focus-within{border-color:var(--accent);border-style:solid}
.add-step-box input{
  flex:1;border:none;outline:none;font-size:15px;
  font-family:var(--font);background:transparent;color:var(--text);
}
.add-step-box input::placeholder{color:var(--muted2)}
.add-step-box button{
  padding:6px 13px;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-size:13px;
  font-weight:500;cursor:pointer;white-space:nowrap;
  font-family:var(--font);touch-action:manipulation;
}
.add-step-box button:active{opacity:.75}

/* в”Ђв”Ђ Notes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.notes-area{display:flex;flex-direction:column;gap:10px}
.notes-area textarea{
  width:100%;min-height:200px;resize:vertical;
  padding:12px;border:1.5px solid var(--border-strong);
  border-radius:var(--r-md);font-size:15px;
  font-family:var(--font);color:var(--text);
  background:#fff;outline:none;line-height:1.55;
}
.notes-area textarea:focus{border-color:var(--accent)}
.notes-footer{display:flex;align-items:center;gap:10px}
.btn-save{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;background:var(--accent);
  color:#fff;border:none;border-radius:8px;
  font-size:15px;font-weight:500;cursor:pointer;
  font-family:var(--font);touch-action:manipulation;
}
.btn-save:active{opacity:.75}
.saved-flash{
  font-size:13px;color:var(--green);
  display:flex;align-items:center;gap:4px;
  opacity:0;transition:opacity .2s;
}
.saved-flash.show{opacity:1}

/* в”Ђв”Ђ Log в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.log-list{display:flex;flex-direction:column;gap:8px}
.log-entry{display:flex;gap:10px;font-size:13px;align-items:flex-start}
.log-time{color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums}
.log-msg{color:var(--text);line-height:1.4}

/* в”Ђв”Ђ Empty states в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.empty-st{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-st i{font-size:40px;display:block;margin-bottom:10px;opacity:.35}
.empty-st p{font-size:15px}
.no-detail{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:var(--muted);
  gap:12px;padding:40px;text-align:center;
}
.no-detail i{font-size:52px;opacity:.2}
.no-detail p{font-size:15px;line-height:1.5}

/* в”Ђв”Ђ Modals в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#modal-overlay,#proj-modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.32);z-index:200;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#modal-overlay.open,#proj-modal-overlay.open{display:flex}
#modal,#proj-modal{
  background:#fff;border-radius:var(--r-lg);
  padding:22px;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
}
#modal h3,#proj-modal h3{
  font-size:17px;font-weight:600;margin-bottom:18px;
  letter-spacing:-.01em;
}
#modal label,#proj-modal label{
  display:block;font-size:13px;font-weight:500;
  color:var(--muted);margin-bottom:5px;
}
#modal input,#modal select,#proj-modal input{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border-strong);
  border-radius:10px;font-size:16px; /* 16px prevents iOS zoom */
  font-family:var(--font);outline:none;
  margin-bottom:14px;color:var(--text);background:#fff;
}
#modal input:focus,#modal select:focus,#proj-modal input:focus{
  border-color:var(--accent);
}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.btn-cancel{
  padding:9px 16px;background:rgba(60,60,67,.1);border:none;
  border-radius:10px;font-size:15px;font-weight:500;
  cursor:pointer;color:var(--text);font-family:var(--font);
  touch-action:manipulation;
}
.btn-cancel:active{opacity:.7}
.btn-primary{
  padding:9px 18px;background:var(--accent);color:#fff;
  border:none;border-radius:10px;font-size:15px;
  font-weight:500;cursor:pointer;font-family:var(--font);
  touch-action:manipulation;
}
.btn-primary:active{opacity:.75}
.color-palette{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.color-swatch{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .12s,border-color .12s;
  touch-action:manipulation;
}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:var(--text)}
.proj-modal-footer{
  display:flex;justify-content:space-between;
  align-items:center;margin-top:4px;
}
.btn-del-proj{
  padding:9px 16px;background:var(--red-soft);color:var(--red);
  border:none;border-radius:10px;font-size:15px;
  font-weight:500;cursor:pointer;font-family:var(--font);
  touch-action:manipulation;
}
.btn-del-proj:active{opacity:.7}

/* в”Ђв”Ђ Sidebar resizer в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#sidebar-resizer{
  width:5px;flex-shrink:0;cursor:col-resize;
  background:transparent;position:relative;z-index:5;
  transition:background .18s;
}
#sidebar-resizer::after{
  content:'';position:absolute;top:0;bottom:0;left:2px;width:1px;
  background:var(--border-strong);transition:background .18s;
}
#sidebar-resizer:hover::after,#sidebar-resizer.resizing::after{
  background:var(--accent);width:2px;left:1.5px;
}
body.resizing{cursor:col-resize!important;user-select:none!important}

/* в”Ђв”Ђ Project section header actions в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.sect-hdr{display:flex;align-items:center;gap:6px;padding:10px 4px 4px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer}
.sect-hdr:hover .sect-hdr-label{color:var(--accent)}
.sect-hdr-label{flex:1;min-width:0;transition:color .12s}
.sect-edit{
  opacity:0;display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;border:none;
  background:transparent;cursor:pointer;color:var(--muted);
  font-size:13px;padding:0;transition:all .12s;flex-shrink:0;
}
.task-section:hover .sect-edit{opacity:1}
.sect-edit:hover{background:rgba(124,111,255,.12);color:var(--accent)}

/* в”Ђв”Ђ Project notes in modal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#proj-modal textarea{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border-strong);
  border-radius:10px;font-size:15px;
  font-family:var(--font);outline:none;
  margin-bottom:14px;color:var(--text);background:#fff;
  resize:vertical;min-height:80px;line-height:1.5;
}
#proj-modal textarea:focus{border-color:var(--accent)}

/* в”Ђв”Ђ Project detail panel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.proj-detail-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.proj-detail-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.proj-detail-name{font-size:20px;font-weight:600;letter-spacing:-.02em;flex:1}
.proj-stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.proj-stat{flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px 12px}
.proj-stat-n{font-size:22px;font-weight:600}
.proj-stat-l{font-size:12px;color:var(--muted);margin-top:2px}
.proj-notes-lbl{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.proj-notes-ta{
  width:100%;min-height:100px;resize:vertical;
  padding:10px;border:1.5px solid var(--border-strong);
  border-radius:10px;font-size:15px;font-family:var(--font);
  color:var(--text);background:#fff;outline:none;line-height:1.5;
}
.proj-notes-ta:focus{border-color:var(--accent)}

<script>
var SUPABASE_URL = 'https://ienfjretjvoupzwncnjb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllbmZqcmV0anZvdXB6d25jbmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTU4NjcsImV4cCI6MjA5NzM3MTg2N30.zItQB5JjKGaM2gGR4eJWBGX4WGgvc1CEYG9Z1I7yU2A';

var STATE_ROW = 'main';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var clientId = Math.random().toString(36).slice(2);

var PROJ_COLORS = ['#7C6FFF','#16A37F','#D97706','#EF4444','#3B82F6','#8B5CF6','#EC4899','#06B6D4'];
var selColor = PROJ_COLORS[0];

var D = {tasks:[], log:[], projects:[]};
var aid = null;
var viewProjId = null; // project detail view
var ctab = 'steps';
var editId = null;
var editProjId = null;
var dragSrc = null;
var xsubs = {};

/* в”Ђв”Ђ Offline-first persistence в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
var LOCAL_KEY = 'chain_local_v1';
var _cloudPending = false;
var saveTimer;

function dotState(s) {
  var el = document.getElementById('sync-dot');
  el.className = s;
  el.title = {
    ok:'Synced to cloud', saving:'SavingвЂ¦', local:'Saved locally вЂ“ will sync when online',
    offline:'Offline вЂ“ changes saved locally', err:'Sync error'
  }[s] || '';
}

/* Write to localStorage instantly, then push to cloud (debounced) */
function sv() {
  D._ts = Date.now();
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(D)); } catch(e) {}
  dotState('local');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushToCloud, 900);
}

async function pushToCloud() {
  if (!navigator.onLine) { _cloudPending = true; dotState('offline'); return; }
  try {
    var res = await db.from('chain_state').upsert({
      id:STATE_ROW, data:D, client_id:clientId, updated_at:new Date().toISOString()
    });
    if (res.error) throw res.error;
    _cloudPending = false;
    dotState('ok');
    setTimeout(function(){ if(document.getElementById('sync-dot').className==='ok') dotState('ok'); }, 2000);
  } catch(e) {
    _cloudPending = true;
    dotState('offline');
    console.error('Cloud sync error:', e);
  }
}

/* Auto-sync when network comes back */
window.addEventListener('online',  function(){ if (_cloudPending) pushToCloud(); });
window.addEventListener('offline', function(){ dotState('offline'); });

var DEFAULT_GOALS = [];
var DEFAULT_CATEGORIES = [
  {id:'finance',   name:'Finance',   color:'#34C759'},
  {id:'marketing', name:'Marketing', color:'#007AFF'},
  {id:'family',    name:'Family',    color:'#FF9500'},
  {id:'health',    name:'Health',    color:'#FF2D55'},
  {id:'personal',  name:'Personal',  color:'#5856D6'},
];

function ensureDefaults() {
  if (!D.tasks)      D.tasks      = [];
  if (!D.log)        D.log        = [];
  if (!D.projects)   D.projects   = [];
  if (!D.focus)      D.focus      = [];
  if (!D.goals)      D.goals      = [];
  if (!D.categories) D.categories = DEFAULT_CATEGORIES.map(function(c){return{id:c.id,name:c.name,color:c.color};});
  if (!D.tags)       D.tags       = DEFAULT_TAGS.map(function(t){return{id:t.id,name:t.name,color:t.color};});
  D.tasks.forEach(function(t){
    if (!t.tags)       t.tags=[];
    if (!('goalId' in t))     t.goalId=null;
    if (!('categoryId' in t)) t.categoryId=null;
    (t.steps||[]).forEach(function(s){ if(!s.tags) s.tags=[]; });
  });
  D.projects.forEach(function(p){
    if (!p.tags)             p.tags=[];
    if (!('goalId' in p))    p.goalId=null;
    if (!('categoryId' in p)) p.categoryId=null;
  });
}

async function ld() {
  /* 1. Load local data immediately so the UI is never blank */
  var localStr = localStorage.getItem(LOCAL_KEY);
  if (localStr) {
    try { D = JSON.parse(localStr); ensureDefaults(); } catch(e) {}
  }

  /* 2. Try Supabase вЂ“ use whichever is newer */
  if (!navigator.onLine) { dotState('offline'); return; }
  dotState('saving');
  try {
    var res = await db.from('chain_state').select('data').eq('id', STATE_ROW).maybeSingle();
    if (res.error) throw res.error;
    if (res.data && res.data.data) {
      var cloud = res.data.data;
      /* Use cloud if no local timestamp or cloud is newer */
      if (!D._ts || !cloud._ts || cloud._ts >= D._ts) {
        D = cloud;
        ensureDefaults();
        localStorage.setItem(LOCAL_KEY, JSON.stringify(D));
      } else {
        /* Local is newer (offline edits) вЂ“ push local to cloud */
        _cloudPending = true;
        pushToCloud();
        return;
      }
    } else {
      /* No cloud row yet */
      if (D.tasks && D.tasks.length) {
        /* We have local data вЂ“ push it up */
        _cloudPending = true; pushToCloud();
      } else {
        D = {tasks:[],log:[],projects:[]};
        await db.from('chain_state').insert({id:STATE_ROW, data:D, client_id:clientId});
      }
    }
    dotState('ok');
  } catch(e) {
    console.error('Load error:', e);
    dotState(localStr ? 'offline' : 'err');
  }
}

function startRealtime() {
  db.channel('chain_sync2')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'chain_state',filter:'id=eq.'+STATE_ROW},
      function(payload) {
        if (!payload.new || payload.new.client_id===clientId) return;
        D = payload.new.data || {tasks:[],log:[],projects:[]};
        ensureDefaults();
        try { localStorage.setItem(LOCAL_KEY, JSON.stringify(D)); } catch(e) {}
        render();
      })
    .subscribe();
}

function uid()  { return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function ts()   { var n=new Date(); return ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2); }
function lg(m)  { D.log.unshift({t:ts(),m:m}); if(D.log.length>80) D.log.length=80; }
function gt(id) { return D.tasks.find(function(t){return t.id===id;}); }
function gp(id) { return D.projects.find(function(p){return p.id===id;}); }
function xe(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function pct(t) {
  var done=0,total=0;
  t.steps.forEach(function(s){
    total++; if(s.done) done++;
    (s.subs||[]).forEach(function(b){total++;if(b.done)done++;});
  });
  return total?Math.round(done/total*100):0;
}

function sd(t) {
  var hasCurr=t.steps.some(function(s){return s.current&&!s.done;});
  if(!hasCurr){var f=t.steps.find(function(s){return!s.done;});if(f)f.current=true;}
}

/* в”Ђв”Ђ Swipe-to-reveal engine в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
var _sw = null;

function swClose(btn) {
  var wrap = btn.closest('.sw-wrap');
  if (wrap) _swSnapClose(wrap.querySelector('.sw-inner'));
}
function swCheckClose(el) {
  /* returns true if a swipe was open (so we DON'T also toggle collapse) */
  var wrap = el.closest('.sw-wrap');
  if (!wrap) return false;
  var inner = wrap.querySelector('.sw-inner');
  if (inner && inner._swX && inner._swX < -10) {
    _swSnapClose(inner); return true;
  }
  return false;
}

function _swSnapClose(inner) {
  if (!inner) return;
  inner.style.transition = 'transform .2s';
  inner.style.transform  = 'translateX(0)';
  inner._swX = 0;
  if (inner.parentElement) inner.parentElement.classList.remove('sw-open');
  setTimeout(function(){ inner.style.transition = ''; }, 220);
}
function _swSnapOpen(inner, w) {
  inner.style.transition = 'transform .2s';
  inner.style.transform  = 'translateX(-'+w+'px)';
  inner._swX = -w;
  if (inner.parentElement) inner.parentElement.classList.add('sw-open');
  setTimeout(function(){ inner.style.transition = ''; }, 220);
}
function _swCloseAll(exceptWrap) {
  document.querySelectorAll('.sw-inner').forEach(function(inner) {
    if (inner._swX && inner._swX < -5) {
      if (!exceptWrap || inner.closest('.sw-wrap') !== exceptWrap)
        _swSnapClose(inner);
    }
  });
}

document.addEventListener('touchstart', function(e) {
  var wrap = e.target.closest('.sw-wrap');
  var inner = wrap ? wrap.querySelector('.sw-inner') : null;
  /* Close any open swipes that aren't the touched one */
  _swCloseAll(wrap || null);
  if (!wrap || !inner) { _sw = null; return; }
  _sw = {
    inner: inner,
    wrap:  wrap,
    x0: e.touches[0].clientX,
    y0: e.touches[0].clientY,
    x:  inner._swX || 0,
    moved: false,
    dir: null
  };
}, {passive:true});

document.addEventListener('touchmove', function(e) {
  if (!_sw) return;
  var dx = e.touches[0].clientX - _sw.x0;
  var dy = e.touches[0].clientY - _sw.y0;
  if (!_sw.dir) {
    if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    _sw.dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  }
  if (_sw.dir === 'v') { _sw = null; return; }
  e.preventDefault();
  _sw.moved = true;
  var btns = _sw.wrap.querySelector('.sw-btns');
  var btnW = btns ? btns.offsetWidth : 136;
  var newX = Math.max(-btnW, Math.min(0, _sw.x + dx));
  _sw.inner.style.transform = 'translateX('+newX+'px)';
  _sw.inner._swX = newX;
}, {passive:false});

document.addEventListener('touchend', function(e) {
  if (!_sw || !_sw.moved) { _sw = null; return; }
  var btns = _sw.wrap.querySelector('.sw-btns');
  var btnW = btns ? btns.offsetWidth : 136;
  var x = _sw.inner._swX || 0;
  if (x < -(btnW * 0.38)) {
    _swSnapOpen(_sw.inner, btnW);
  } else {
    _swSnapClose(_sw.inner);
  }
  _sw = null;
}, {passive:true});

/* в”Ђв”Ђ Focus helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
function isFocused(type, id) {
  return !!(D.focus||[]).find(function(f){
    return f.type===type && (
      (type==='task'    && f.taskId===id) ||
      (type==='project' && f.projId===id) ||
      (type==='step'    && f.stepId===id)
    );
  });
}

function toggleFocus(type, refId, parentTaskId) {
  if (!D.focus) D.focus = [];
  var found = D.focus.find(function(f){
    return f.type===type && (
      (type==='task'    && f.taskId===refId) ||
      (type==='project' && f.projId===refId) ||
      (type==='step'    && f.stepId===refId)
    );
  });
  if (found) {
    D.focus = D.focus.filter(function(f){ return f.fid!==found.fid; });
  } else {
    var item = {fid:uid(), type:type};
    if (type==='task')    item.taskId = refId;
    if (type==='project') item.projId = refId;
    if (type==='step')  { item.stepId = refId; item.taskId = parentTaskId; }
    D.focus.push(item);
  }
  sv(); renderList(); if(aid) renderDetail();
}

function moveFocus(fid, dir) {
  var arr=D.focus||[]; var i=arr.findIndex(function(f){return f.fid===fid;});
  if(i<0) return;
  var j=i+dir; if(j<0||j>=arr.length) return;
  var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  sv(); renderList();
}

function toggleStepInFocus(taskId, stepId) {
  aid = taskId; toggleStep(stepId); renderList();
}

/* в”Ђв”Ђ Alive focus list в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
function renderFocusList(el) {
  if (!D.focus) D.focus = [];
  var fc = D.focus.filter(function(f){
    if (f.type==='task')    return !!gt(f.taskId);
    if (f.type==='project') return !!gp(f.projId);
    if (f.type==='step')    { var t=gt(f.taskId); return t&&!!t.steps.find(function(s){return s.id===f.stepId;}); }
    return false;
  });
  if (!fc.length) {
    el.innerHTML='<div class="empty-st"><i class="ti ti-pin"></i><p>Focus list is empty.<br>Tap рџ“Њ on any task, project<br>or step to add it here.</p></div>';
    return;
  }
  el.innerHTML = fc.map(function(f, idx) {
    var ctrl = '<div class="focus-ctrl">'+
      '<button class="focus-arrow" onclick="moveFocus(\''+f.fid+'\',-1)"'+(idx===0?' disabled':'')+'>'+
        '<i class="ti ti-chevron-up"></i></button>'+
      '<span class="focus-num">'+(idx+1)+'</span>'+
      '<button class="focus-arrow" onclick="moveFocus(\''+f.fid+'\',1)"'+(idx===fc.length-1?' disabled':'')+'>'+
        '<i class="ti ti-chevron-down"></i></button>'+
    '</div>';

    if (f.type==='task') {
      var t = gt(f.taskId);
      return '<div class="focus-row-wrap">'+ctrl+'<div class="focus-main">'+taskRowHtml(t)+'</div></div>';
    }
    if (f.type==='project') {
      var p = gp(f.projId);
      var ac = D.tasks.filter(function(t){return t.projectId===f.projId&&!t.done;}).length;
      var pinned = isFocused('project', f.projId);
      return '<div class="focus-row-wrap">'+ctrl+
        '<div class="focus-main">'+
          '<div class="focus-proj-row" onclick="viewProjId=\''+f.projId+'\';aid=null;renderDetail()">'+
            '<span class="proj-group-dot" style="background:'+p.color+'"></span>'+
            '<span class="proj-group-name" style="color:'+p.color+';font-size:14px;font-weight:700;flex:1">'+xe(p.name)+'</span>'+
            '<span style="font-size:11px;color:var(--muted)">'+ac+' active</span>'+
            '<button class="tr-pin'+(pinned?' pinned':'')+'" onclick="event.stopPropagation();toggleFocus(\'project\',\''+f.projId+'\')"><i class="ti ti-pin"></i></button>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
    if (f.type==='step') {
      var pt = gt(f.taskId);
      var s  = pt.steps.find(function(x){return x.id===f.stepId;});
      var chkCls = 'step-check'+(s.done?' checked':'');
      var pinned2 = isFocused('step', f.stepId);
      return '<div class="focus-row-wrap">'+ctrl+
        '<div class="focus-main">'+
          '<div class="focus-step-row" onclick="sel(\''+pt.id+'\')">'+
            '<div class="'+chkCls+'" onclick="event.stopPropagation();toggleStepInFocus(\''+pt.id+'\',\''+s.id+'\')">'+
              (s.done?'<i class="ti ti-check"></i>':'')+
            '</div>'+
            '<div style="flex:1;min-width:0">'+
              '<div class="focus-step-name'+(s.done?' tr-done':'')+'">'+xe(s.text)+'</div>'+
              '<div class="focus-step-parent">'+xe(pt.title)+'</div>'+
            '</div>'+
            '<button class="tr-pin'+(pinned2?' pinned':'')+'" onclick="event.stopPropagation();toggleFocus(\'step\',\''+s.id+'\',\''+pt.id+'\')"><i class="ti ti-pin"></i></button>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
  }).join('');
}

    var directTasks = tasks.filter(function(t){return !t.projectId || !projs.find(function(p){return p.id===t.projectId;});});
    if (directTasks.length) {
      html += '<div style="padding:6px 14px 2px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Direct Tasks</div>';
      html += directTasks.map(taskRowHtml).join('');
    }
    if (!projs.length && !tasks.length) {
      html += '<div class="empty-st"><i class="ti ti-flag"></i><p>No items under this goal yet.<br>Edit a project or task to assign it.</p></div>';
    }
  }
  el.innerHTML = html;
}

function openStepModal(sid, taskId) {
  var tId = taskId || aid;
  var t = gt(tId); if (!t) return;
  var s = t.steps.find(function(x){ return x.id===sid; }); if (!s) return;
  editingStepId = sid;
  if (taskId) aid = taskId; // ensure aid set for save
  document.getElementById('step-modal-text').value = s.text;
  document.getElementById('step-modal-delegate').value = s.delegatedTo||'';
  editingStepTags = (s.tags||[]).slice();
  renderStepModalTagPicker();
  document.getElementById('step-modal-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('step-modal-text').focus(); }, 60);
}
function closeStepModal() {
  document.getElementById('step-modal-overlay').classList.remove('open');
  editingStepId = null; editingStepTags = [];
}
function saveStepModal() {
  var text = document.getElementById('step-modal-text').value.trim(); if (!text) return;
  var delg = document.getElementById('step-modal-delegate').value.trim();
  var t = gt(aid); if (!t) return;
  var s = t.steps.find(function(x){ return x.id===editingStepId; }); if (!s) return;
  s.text = text;
  s.tags = editingStepTags.slice();
  if (delg) { s.delegated=true; s.delegatedTo=delg; }
  else { s.delegated=false; s.delegatedTo=null; }
  lg('Step updated in "'+t.title+'": '+text);
  sv(); closeStepModal(); render();
}
