function taskRowHtml(t) {
  var p = pct(t);
  var proj = t.projectId ? gp(t.projectId) : null;
  var dot = proj ? proj.color : '#8B8BA7';
  var doneS = t.steps.filter(function(s){return s.done;}).length;
  var meta = t.steps.length ? doneS+'/'+t.steps.length+' steps' : 'No steps';
  if (t.assignee) meta += ' В· '+xe(t.assignee);
  if (t.dueDate) {
    var today0=new Date(); today0.setHours(0,0,0,0);
    var due0=new Date(t.dueDate+'T00:00:00');
    var diff=Math.round((due0-today0)/(1000*60*60*24));
    var dueLabel = diff===0?'Due today':diff===1?'Due tomorrow':diff<0?Math.abs(diff)+'d overdue':'Due '+t.dueDate;
    meta += ' В· рџ“… '+dueLabel;
  }
  var taskTags = (t.tags||[]).map(function(tid2){
    var tg=(D.tags||[]).find(function(x){return x.id===tid2;});
    return tg?'<span class="task-tag" style="background:'+tg.color+'22;color:'+tg.color+'">'+xe(tg.name)+'</span>':'';
  }).join('');
  var goalChip=''; if(t.goalId){var tg2=(D.goals||[]).find(function(x){return x.id===t.goalId;}); if(tg2) goalChip='<span class="gc-chip" style="background:'+tg2.color+'22;color:'+tg2.color+'">рџЋЇ '+xe(tg2.name)+'</span>';}
  var catChip='';  if(t.categoryId){var tc2=(D.categories||[]).find(function(x){return x.id===t.categoryId;}); if(tc2) catChip='<span class="gc-chip" style="background:'+tc2.color+'22;color:'+tc2.color+'">'+xe(tc2.name)+'</span>';}
  var cls = 'task-row'+(t.id===aid?' tr-active':'')+(t.done?' tr-done':'');
  var tid = xe(t.id);
  var pinned = isFocused('task', t.id);
  return '<div class="sw-wrap">'+
    '<div class="sw-btns">'+
      '<button class="sw-btn sw-edit" onclick="swClose(this);openModal(\''+tid+'\')"><i class="ti ti-edit"></i>Edit</button>'+
      '<button class="sw-btn sw-del"  onclick="swClose(this);deleteTask(\''+tid+'\')"><i class="ti ti-trash"></i>Delete</button>'+
    '</div>'+
    '<div class="sw-inner">'+
      '<div class="'+cls+'" onclick="sel(\''+t.id+'\')" >'+
        '<div class="tr-dot" style="background:'+dot+'"></div>'+
        '<div class="tr-body">'+
          '<div class="tr-name" onclick="event.stopPropagation();this.classList.toggle(\'expanded\')">'+xe(t.title)+'</div>'+
          '<div class="tr-meta">'+meta+(goalChip||catChip?'<span style="margin-left:2px">'+goalChip+catChip+'</span>':'')+(taskTags?'<span style="margin-left:2px">'+taskTags+'</span>':'')+'</div>'+
        '</div>'+
        '<div class="tr-prog"><div class="tr-fill'+(t.done?' tr-fill-done':'')+'" style="width:'+p+'%"></div></div>'+
        '<button class="tr-check'+(t.done?' tr-checked':'')+'" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')" title="'+(t.done?'Reopen':'Done')+'">'+(t.done?'<i class="ti ti-check"></i>':'')+'</button>'+
        '<button class="tr-pin'+(pinned?' pinned':'')+'" onclick="event.stopPropagation();toggleFocus(\'task\',\''+tid+'\')" title="'+(pinned?'Remove from Focus':'Add to Focus')+'"><i class="ti ti-pin"></i></button>'+
        '<i class="ti ti-chevron-right tr-chev"></i>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function renderList() {
  var el = document.getElementById('task-list');
  if (currentMode==='focus')  { renderFocusList(el); return; }
  if (currentMode==='goals')  { renderGoalsView(el); return; }
  if (currentMode==='cats')   { renderCatsView(el); return; }
  if (currentMode==='tags')   { renderTagsView(el); return; }
  if (currentMode==='people') { renderPeopleView(el); return; }
  var q = searchQ.trim().toLowerCase();
  var tasks = q
    ? D.tasks.filter(function(t){
        return t.title.toLowerCase().indexOf(q) !== -1 ||
          (t.assignee||'').toLowerCase().indexOf(q) !== -1 ||
          (t.steps||[]).some(function(s){ return s.text.toLowerCase().indexOf(q) !== -1; });
      })
    : D.tasks;

  var groups = [];
  D.projects.forEach(function(p) {
    var pt = tasks.filter(function(t){ return t.projectId === p.id; });
    /* show project if name matches search OR has matching tasks */
    if (!q || pt.length || p.name.toLowerCase().indexOf(q) !== -1) {
      var showTasks = pt.length ? pt : (p.name.toLowerCase().indexOf(q) !== -1 ? D.tasks.filter(function(t){return t.projectId===p.id;}) : pt);
      groups.push({label:p.name, color:p.color, projId:p.id, tasks:showTasks});
    }
  });
  var standalone = tasks.filter(function(t){ return !t.projectId; });
  if (standalone.length || !q) {
    groups.push({label:'My Tasks', color:'#8B8BA7', projId:'_standalone', tasks:standalone});
  }

  if (!groups.length) {
    el.innerHTML = '<div class="empty-st"><i class="ti ti-list-check"></i><p>'+(D.projects.length||D.tasks.length?'No results':'Add a project or task to get started')+'</p></div>';
    return;
  }

  el.innerHTML = groups.map(function(g) {
    var collapsed = collapsedProjs[g.projId] !== false;
    var countLabel = g.tasks.length ? '<span class="proj-group-count">'+g.tasks.length+'</span>' : '';
    var isProj = g.projId !== '_standalone';
    var projPinned = isProj && isFocused('project', g.projId);
    var pinBtn = isProj
      ? '<button class="tr-pin'+(projPinned?' pinned':'')+'" onclick="event.stopPropagation();toggleFocus(\'project\',\''+g.projId+'\')" title="Focus"><i class="ti ti-pin"></i></button>'
      : '';
    /* Always-visible Edit+Delete for desktop AND mobile (swipe is bonus on mobile) */
    var hdrActs = isProj
      ? '<div class="proj-hdr-acts">'+
          '<button class="proj-hdr-btn" onclick="event.stopPropagation();openProjModal(\''+g.projId+'\')" title="Edit"><i class="ti ti-edit"></i></button>'+
          '<button class="proj-hdr-btn del" onclick="event.stopPropagation();deleteProjSwipe(\''+g.projId+'\')" title="Delete"><i class="ti ti-trash"></i></button>'+
        '</div>'
      : '';
    var swBtns = isProj
      ? '<div class="sw-btns">'+
          '<button class="sw-btn sw-edit" onclick="swClose(this);openProjModal(\''+g.projId+'\')"><i class="ti ti-edit"></i>Edit</button>'+
          '<button class="sw-btn sw-del"  onclick="swClose(this);deleteProjSwipe(\''+g.projId+'\')"><i class="ti ti-trash"></i>Delete</button>'+
        '</div>'
      : '';
    return '<div class="proj-group">'+
      '<div class="sw-wrap">'+
        swBtns+
        '<div class="sw-inner">'+
          '<div class="proj-group-hdr" onclick="swCheckClose(this)||toggleProjCollapse(\''+g.projId+'\')">'+
            '<span class="proj-group-dot" style="background:'+g.color+'"></span>'+
            '<span class="proj-group-name" style="color:'+g.color+'">'+xe(g.label)+'</span>'+
            countLabel+
            pinBtn+
            hdrActs+
            '<i class="ti ti-chevron-right proj-chev'+(collapsed?'':' open')+'"></i>'+
          '</div>'+
        '</div>'+
      '</div>'+
      (!collapsed && g.tasks.length
        ? '<div class="proj-group-tasks">'+g.tasks.map(taskRowHtml).join('')+'</div>'
        : (!collapsed && !g.tasks.length ? '<div style="padding:6px 16px 10px;font-size:13px;color:var(--muted)">No tasks yet вЂ” tap + to add</div>' : '')
      )+
    '</div>';
  }).join('');
}

function saveProjNotes() {
  var p = gp(viewProjId); if(!p) return;
  var ta = document.getElementById('proj-notes-ta'); if(!ta) return;
  p.notes = ta.value; sv();
  var fl = document.getElementById('proj-notes-flash');
  if(fl){fl.classList.add('show');setTimeout(function(){fl.classList.remove('show');},1700);}
}

/* в”Ђв”Ђ Full alive project view в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
var collapsedProjTasks = {}; // track expanded tasks in project view

function renderProjView(el, p) {
  var ptasks = D.tasks.filter(function(t){return t.projectId===p.id;});
  var done2  = ptasks.filter(function(t){return t.done;}).length;
  var active2 = ptasks.length - done2;
  var avg = ptasks.length ? Math.round(ptasks.reduce(function(s,t){return s+pct(t);},0)/ptasks.length) : 0;
  var projTags = (p.tags||[]).map(function(tid2){
    var tg=(D.tags||[]).find(function(x){return x.id===tid2;});
    return tg?'<span class="proj-view-tag" style="background:'+tg.color+'22;color:'+tg.color+'">'+xe(tg.name)+'</span>':'';
  }).join('');

  var tasksHtml = ptasks.map(function(t){
    var expanded = collapsedProjTasks[t.id] === true;
    var doneS = (t.steps||[]).filter(function(s){return s.done;}).length;
    var stepsTotal = (t.steps||[]).length;
    var taskTagHtml = (t.tags||[]).map(function(tid2){
      var tg=(D.tags||[]).find(function(x){return x.id===tid2;});
      return tg?'<span class="task-tag" style="background:'+tg.color+'22;color:'+tg.color+'">'+xe(tg.name)+'</span>':'';
    }).join('');
    var metaStr = stepsTotal ? doneS+'/'+stepsTotal+' steps' : 'No steps';
    if (t.assignee) metaStr += ' В· '+xe(t.assignee);
    var pinned = isFocused('task', t.id);

    var stepsHtml = '';
    if (expanded) {
      stepsHtml = '<div class="proj-steps-block">'+
        (t.steps||[]).map(function(s){
          var stepTagHtml=(s.tags||[]).map(function(tid2){var tg=(D.tags||[]).find(function(x){return x.id===tid2;});return tg?'<span class="step-tag" style="background:'+tg.color+'22;color:'+tg.color+'">'+xe(tg.name)+'</span>':'';}).join('');
          var stepPinned = isFocused('step', s.id);
          var delegHtml = (s.delegated&&s.delegatedTo)?'<div class="proj-step-deleg"><i class="ti ti-arrow-forward"></i> '+xe(s.delegatedTo)+'</div>':'';
          return '<div class="proj-step-row">'+
            '<div class="proj-step-chk'+(s.done?' done':'')+'" onclick="toggleStepInProjView(\''+t.id+'\',\''+s.id+'\')">'+
              (s.done?'<i class="ti ti-check"></i>':'')+
            '</div>'+
            '<div class="proj-step-body">'+
              '<div class="proj-step-text'+(s.done?' done':'')+'">'+xe(s.text)+'</div>'+
              delegHtml+
              (stepTagHtml?'<div class="step-tags" style="margin-top:2px">'+stepTagHtml+'</div>':'')+
            '</div>'+
            '<div class="proj-step-acts">'+
              '<button class="proj-step-btn" onclick="openStepModal(\''+s.id+'\',\''+t.id+'\')" title="Edit"><i class="ti ti-edit"></i></button>'+
              '<button class="proj-step-btn'+(stepPinned?' pin-on':'')+'" onclick="toggleFocus(\'step\',\''+s.id+'\',\''+t.id+'\')" title="Focus"><i class="ti ti-pin"></i></button>'+
              '<button class="proj-step-btn del" onclick="delStepInProjView(\''+t.id+'\',\''+s.id+'\')" title="Delete"><i class="ti ti-trash"></i></button>'+
            '</div>'+
          '</div>';
        }).join('')+
        '<div class="proj-add-step">'+
          '<input id="padd-'+t.id+'" type="text" placeholder="Add stepвЂ¦" autocomplete="off" onkeydown="if(event.key===\'Enter\')addStepInProjView(\''+t.id+'\')">'+
          '<button onclick="addStepInProjView(\''+t.id+'\')">+ Add</button>'+
        '</div>'+
      '</div>';
    }

    return '<div class="proj-task-block">'+
      '<div class="proj-task-row">'+
        '<div class="proj-task-check" onclick="toggleDoneInProjView(\''+t.id+'\')">'+
          '<div class="ck'+(t.done?' done':'')+'">'+( t.done?'<i class="ti ti-check"></i>':'')+'</div>'+
        '</div>'+
        '<div class="proj-task-body" onclick="toggleProjTask(\''+t.id+'\')">'+
          '<div class="proj-task-name'+(t.done?' done':'')+'">'+xe(t.title)+'</div>'+
          '<div class="proj-task-meta">'+metaStr+(taskTagHtml?'<span style="margin-left:4px">'+taskTagHtml+'</span>':'')+'</div>'+
        '</div>'+
        '<div class="proj-task-acts">'+
          '<button class="proj-task-btn'+(pinned?' pin-on':'')+'" onclick="toggleFocus(\'task\',\''+t.id+'\')" title="Focus"><i class="ti ti-pin"></i></button>'+
          '<button class="proj-task-btn" onclick="openModal(\''+t.id+'\')" title="Edit"><i class="ti ti-edit"></i></button>'+
          '<button class="proj-task-btn" onclick="sel(\''+t.id+'\')" title="Open detail"><i class="ti ti-chevron-right"></i></button>'+
          '<button class="proj-task-btn danger" onclick="deleteTask(\''+t.id+'\')" title="Delete"><i class="ti ti-trash"></i></button>'+
        '</div>'+
      '</div>'+
      stepsHtml+
    '</div>';
  }).join('');

  el.innerHTML =
    '<button class="btn-mob-back" onclick="mobileBack()" style="display:none" id="mob-back-btn"><i class="ti ti-chevron-left"></i> Tasks</button>'+
    '<div class="proj-view-hdr">'+
      '<div class="proj-view-dot" style="background:'+p.color+'"></div>'+
      '<div class="proj-view-name" style="color:'+p.color+'">'+xe(p.name)+'</div>'+
      '<div class="proj-view-act">'+
        '<button class="btn-icon" onclick="openProjModal(\''+p.id+'\')" title="Edit"><i class="ti ti-edit"></i></button>'+
        '<button class="btn-icon danger" onclick="deleteProjView(\''+p.id+'\')" title="Delete"><i class="ti ti-trash"></i></button>'+
      '</div>'+
    '</div>'+
    (projTags?'<div class="proj-view-tags">'+projTags+'</div>':'')+
    '<div class="proj-view-stats">'+
      '<div class="proj-view-stat"><div class="proj-view-stat-n" style="color:var(--accent)">'+active2+'</div><div class="proj-view-stat-l">Active</div></div>'+
      '<div class="proj-view-stat"><div class="proj-view-stat-n" style="color:var(--green)">'+done2+'</div><div class="proj-view-stat-l">Done</div></div>'+
      '<div class="proj-view-stat"><div class="proj-view-stat-n">'+avg+'%</div><div class="proj-view-stat-l">Progress</div></div>'+
    '</div>'+
    '<div class="proj-view-prog"><div class="proj-view-prog-fill" style="width:'+avg+'%;background:'+p.color+'"></div></div>'+
    '<button class="proj-view-add-btn" onclick="openModalForProj(\''+p.id+'\')"><i class="ti ti-plus"></i> Add Task to this Project</button>'+
    (tasksHtml || '<div style="padding:20px 14px;color:var(--muted);font-size:13px">No tasks yet вЂ” add one above.</div>')+
    '<div class="proj-notes-section">'+
      '<label>Project Notes</label>'+
      '<textarea class="proj-notes-ta" id="proj-notes-ta" placeholder="Goals, context, linksвЂ¦">'+xe(p.notes||'')+'</textarea>'+
      '<div class="notes-footer" style="margin-top:6px">'+
        '<button class="btn-save" onclick="saveProjNotes()"><i class="ti ti-device-floppy"></i> Save notes</button>'+
        '<span class="saved-flash" id="proj-notes-flash"><i class="ti ti-check"></i> Saved</span>'+
      '</div>'+
    '</div>';
}

function toggleProjTask(tid) {
  collapsedProjTasks[tid] = !collapsedProjTasks[tid];
  renderDetail();
}

function toggleDoneInProjView(tid) {
  var t=gt(tid); if(!t) return; t.done=!t.done; sv(); renderDetail(); renderList();
}

function toggleStepInProjView(taskId, sid) {
  var t=gt(taskId); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  s.done=!s.done; sv(); renderDetail(); renderList();
}

function addStepInProjView(taskId) {
  var inp=document.getElementById('padd-'+taskId); if(!inp) return;
  var text=inp.value.trim(); if(!text) return;
  var t=gt(taskId); if(!t) return;
  t.steps.push({id:uid(),text:text,done:false,tags:[]});
  lg('Step added to "'+t.title+'": '+text);
  sv(); renderDetail(); renderList();
}

function delStepInProjView(taskId, sid) {
  var t=gt(taskId); if(!t) return;
  t.steps=t.steps.filter(function(s){return s.id!==sid;});
  sv(); renderDetail(); renderList();
}

function openModalForProj(projId) {
  openModal(null);
  setTimeout(function(){
    var sel=document.getElementById('modal-project');
    if(sel) sel.value=projId;
  }, 30);
}

function deleteProjView(id) {
  var p=gp(id); if(!p) return;
  if(!confirm('Delete project "'+p.name+'"? Tasks will become standalone.')) return;
  D.projects=D.projects.filter(function(x){return x.id!==id;});
  D.tasks.forEach(function(t){if(t.projectId===id)t.projectId=null;});
  lg('Project deleted: "'+p.name+'"');
  viewProjId=null; sv(); render();
}

function renderDetail() {
  var el = document.getElementById('detail');

  // в”Ђв”Ђ Project detail view в”Ђв”Ђ
  if (viewProjId) {
    var p = gp(viewProjId);
    if (!p) { viewProjId=null; }
    else {
      renderProjView(el, p);
      var bb=document.getElementById('mob-back-btn');
      if(bb) bb.style.display=isMob()?'flex':'none';
      return;
    }
  }

  var t = aid ? gt(aid) : null;
  if (!t) {
    el.innerHTML='<div class="no-detail"><i class="ti ti-hand-click"></i><p>Select a task to see details</p></div>';
    document.body.classList.remove('mob-detail');
    return;
  }
  var p = pct(t);
  var proj = t.projectId ? gp(t.projectId) : null;
  var projChip = proj ? '<span class="proj-tag" style="background:'+proj.color+'">'+xe(proj.name)+'</span>' : '';
  var assigneeHtml = t.assignee ? '<span class="chip chip-assignee"><i class="ti ti-user"></i>'+xe(t.assignee)+'</span>' : '';
  el.innerHTML=
    '<div class="detail-inner">'+
      '<button class="btn-mob-back" onclick="mobileBack()" style="display:none" id="mob-back-btn"><i class="ti ti-chevron-left"></i> Tasks</button>'+
      '<div class="detail-header">'+
        '<div class="detail-title">'+xe(t.title)+'</div>'+
        '<div class="detail-actions">'+
          '<button class="btn-icon" onclick="openModal(\''+t.id+'\')" title="Edit"><i class="ti ti-edit"></i></button>'+
          '<button class="btn-icon danger" onclick="delTask(\''+t.id+'\')" title="Delete"><i class="ti ti-trash"></i></button>'+
        '</div>'+
      '</div>'+
      '<div class="detail-meta">'+
        projChip+assigneeHtml+
        '<div class="detail-prog"><div class="prog-fill'+(t.done?' done-fill':'')+'" style="width:'+p+'%"></div></div>'+
        '<div class="detail-pct">'+p+'%</div>'+
      '</div>'+
      '<div class="tabs">'+
        '<button class="tab-btn'+(ctab==='steps'?' active':'')+'" onclick="setTab(\'steps\')">Steps</button>'+
        '<button class="tab-btn'+(ctab==='notes'?' active':'')+'" onclick="setTab(\'notes\')">Notes</button>'+
        '<button class="tab-btn'+(ctab==='log'  ?' active':'')+'" onclick="setTab(\'log\')">Log</button>'+
      '</div>'+
      '<div id="tab-content"></div>'+
    '</div>';
  renderTab();
  var bb=document.getElementById('mob-back-btn');
  if(bb) bb.style.display=isMob()?'flex':'none';
}

function setTab(tab) {
  ctab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',['steps','notes','log'][i]===tab);
  });
  renderTab();
}
function renderTab() {
  var el=document.getElementById('tab-content'); if(!el) return;
  if(ctab==='steps') renderSteps(el);
  else if(ctab==='notes') renderNotes(el);
  else renderLog(el);
}

function renderSteps(el) {
  var t=gt(aid); if(!t) return;
  var stepsHtml='';
  if(!t.steps.length) {
    stepsHtml='<div class="empty-st" style="padding:20px 0"><i class="ti ti-stairs"></i><p>No steps yet</p></div>';
  } else {
    stepsHtml='<div class="steps-list">'+
      t.steps.map(function(s,i){
        var rowCls='step-row'+(s.done?' done':(s.current?' curr':''));
        var chkCls='step-check'+(s.done?' checked':(s.current?' curr-check':''));
        var delegHtml=(s.delegated&&s.delegatedTo)?'<div class="step-deleg"><i class="ti ti-arrow-forward"></i>'+xe(s.delegatedTo)+'</div>':'';
        var stepTagsHtml=(s.tags||[]).length?'<div class="step-tags">'+
          (s.tags||[]).map(function(tid2){var tg=(D.tags||[]).find(function(x){return x.id===tid2;});return tg?'<span class="step-tag" style="background:'+tg.color+'22;color:'+tg.color+'">'+xe(tg.name)+'</span>':'';}).join('')+'</div>':'';
        var cnt=(s.subs||[]).length;
        var open=xsubs[s.id];
        var subsColor=open?' style="color:var(--accent)"':'';
        var subsBadge=cnt?'<span style="font-size:10px;margin-left:1px">'+cnt+'</span>':'';
        var currBtn=!s.done?'<button class="step-btn" onclick="setCurr(\''+s.id+'\')" title="Set current"><i class="ti ti-player-play"></i></button>':'';
        var delegColor=s.delegated?' style="color:var(--amber)"':'';
        var stepPinned = isFocused('step', s.id);
        var stepPinColor = stepPinned ? ' style="color:#FF9500"' : '';
        return '<div class="sw-wrap">'+
          '<div class="sw-btns">'+
            '<button class="sw-btn sw-edit" onclick="swClose(this);editStepSwipe(\''+s.id+'\')"><i class="ti ti-edit"></i>Edit</button>'+
            '<button class="sw-btn sw-del"  onclick="swClose(this);delStep(\''+s.id+'\')"><i class="ti ti-trash"></i>Delete</button>'+
          '</div>'+
          '<div class="sw-inner">'+
            '<div class="'+rowCls+'" draggable="true"'+
                ' ondragstart="ds(event,'+i+')" ondragover="dov(event)" ondrop="drp(event,'+i+')"'+
                ' ondragenter="den(event)" ondragleave="dleave(event)">'+
              '<span class="step-grip ti ti-grip-vertical"></span>'+
              '<div class="'+chkCls+'" onclick="toggleStep(\''+s.id+'\')">'+
                (s.done?'<i class="ti ti-check"></i>':'')+
              '</div>'+
              '<div class="step-body"><div class="step-text">'+xe(s.text)+'</div>'+delegHtml+stepTagsHtml+'</div>'+
              '<div class="step-acts">'+
                currBtn+
                '<button class="step-btn" onclick="delegSt(\''+s.id+'\')"'+delegColor+' title="Delegate"><i class="ti ti-user-share"></i></button>'+
                '<button class="step-btn" onclick="toggleSubs(\''+s.id+'\')"'+subsColor+' title="Substeps"><i class="ti ti-subtask"></i>'+subsBadge+'</button>'+
                '<button class="step-btn"'+stepPinColor+' onclick="toggleFocus(\'step\',\''+s.id+'\',\''+t.id+'\')" title="'+(stepPinned?'Remove from Focus':'Add to Focus')+'"><i class="ti ti-pin"></i></button>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        (open?'<div class="sub-area">'+renderSubsHtml(s)+'</div>':'');
      }).join('')+
    '</div>';
  }
  el.innerHTML=stepsHtml+
    '<div class="add-step-box">'+
      '<input id="step-input" type="text" placeholder="Add a stepвЂ¦" autocomplete="off" onkeydown="if(event.key===\'Enter\')addStep()">'+
      '<button onclick="addStep()"><i class="ti ti-plus"></i> Add</button>'+
    '</div>';
}

function renderSubsHtml(s) {
  var rows=(s.subs||[]).map(function(b){
    return '<div class="sub-row">'+
      '<div class="sub-check'+(b.done?' checked':'')+'" onclick="toggleSub(\''+s.id+'\',\''+b.id+'\')">'+
        (b.done?'<i class="ti ti-check"></i>':'')+
      '</div>'+
      '<span class="sub-text'+(b.done?' done':'')+'">'+xe(b.text)+'</span>'+
      '<button class="sub-del" onclick="delSub(\''+s.id+'\',\''+b.id+'\')"><i class="ti ti-x"></i></button>'+
    '</div>';
  }).join('');
  return '<div class="sub-list">'+rows+'</div>'+
    '<div class="add-sub">'+
      '<input type="text" id="si-'+s.id+'" placeholder="Add substepвЂ¦" autocomplete="off" onkeydown="if(event.key===\'Enter\')addSub(\''+s.id+'\')">'+
      '<button onclick="addSub(\''+s.id+'\')">Add</button>'+
    '</div>';
}

function renderNotes(el) {
  var t=gt(aid); if(!t) return;
  el.innerHTML='<div class="notes-area">'+
    '<textarea id="notes-input" placeholder="Notes for this taskвЂ¦">'+xe(t.notes||'')+'</textarea>'+
    '<div class="notes-footer">'+
      '<button class="btn-save" onclick="saveNotes()"><i class="ti ti-device-floppy"></i> Save</button>'+
      '<span class="saved-flash" id="saved-flash"><i class="ti ti-check"></i> Saved</span>'+
    '</div></div>';
}

function renderLog(el) {
  var t=gt(aid); if(!t) return;
  var entries=D.log.filter(function(e){return e.m.indexOf('"'+t.title+'"')!==-1;}).slice(0,25);
  if(!entries.length){el.innerHTML='<div class="empty-st" style="padding:20px 0"><i class="ti ti-history"></i><p>No log entries yet</p></div>';return;}
  el.innerHTML='<div class="log-list">'+
    entries.map(function(e){return '<div class="log-entry"><span class="log-time">'+xe(e.t)+'</span><span class="log-msg">'+xe(e.m)+'</span></div>';}).join('')+
  '</div>';
}


function openProjModal(id) {
  editProjId = id || null;
  var nameEl = document.getElementById('proj-modal-name');
  var notesEl = document.getElementById('proj-modal-notes');
  var delBtn = document.getElementById('proj-del-btn');
  var goalSel = document.getElementById('proj-modal-goal');
  var catSel  = document.getElementById('proj-modal-cat');
  if (editProjId) {
    var p = gp(editProjId);
    document.getElementById('proj-modal-title').textContent = 'Edit project';
    nameEl.value = p ? p.name : '';
    notesEl.value = p ? (p.notes||'') : '';
    selColor = p ? p.color : PROJ_COLORS[0];
    editingProjTags = (p&&p.tags)?p.tags.slice():[];
    goalSel.innerHTML = buildGoalOptions(p?p.goalId:null);
    catSel.innerHTML  = buildCatOptions(p?p.categoryId:null);
    delBtn.style.display = 'block';
  } else {
    document.getElementById('proj-modal-title').textContent = 'New project';
    nameEl.value = ''; notesEl.value = '';
    selColor = PROJ_COLORS[0];
    editingProjTags = [];
    goalSel.innerHTML = buildGoalOptions(null);
    catSel.innerHTML  = buildCatOptions(null);
    delBtn.style.display = 'none';
  }
  buildColorPalette();
  renderProjModalTagPicker();
  document.getElementById('proj-modal-overlay').classList.add('open');
  setTimeout(function(){ nameEl.focus(); }, 50);
}
function closeProjModal() {
  document.getElementById('proj-modal-overlay').classList.remove('open');
  editProjId = null; editingProjTags = [];
}
function buildColorPalette() {
  var pal = document.getElementById('color-palette');
  pal.innerHTML = PROJ_COLORS.map(function(c){
    return '<div class="color-swatch'+(c===selColor?' selected':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>';
  }).join('');
}
function pickColor(c) { selColor = c; buildColorPalette(); }
function saveProj() {
  var name   = document.getElementById('proj-modal-name').value.trim(); if (!name) return;
  var notes  = document.getElementById('proj-modal-notes').value;
  var goalId = document.getElementById('proj-modal-goal').value||null;
  var catId  = document.getElementById('proj-modal-cat').value||null;
  if (editProjId) {
    var p = gp(editProjId); if (!p) return;
    p.name=name; p.color=selColor; p.notes=notes; p.tags=editingProjTags.slice();
    p.goalId=goalId; p.categoryId=catId;
    lg('Project updated: "'+name+'"');
    if (viewProjId === editProjId) renderDetail();
  } else {
    D.projects.push({id:uid(),name:name,color:selColor,notes:notes,tags:editingProjTags.slice(),
      goalId:goalId,categoryId:catId,createdAt:new Date().toISOString()});
    lg('Project created: "'+name+'"');
  }
  sv(); closeProjModal(); render();
}
function delProj() {
  if (!editProjId) return;
  var p = gp(editProjId);
  if (!confirm('Delete project "'+( p?p.name:'' )+'"? Tasks will become standalone.')) return;
  D.tasks.forEach(function(t){ if(t.projectId===editProjId) t.projectId=null; });
  D.projects = D.projects.filter(function(x){return x.id!==editProjId;});
  lg('Project deleted: "'+(p?p.name:'')+'"');
  sv(); closeProjModal(); render();
}

function addStep() {
  var inp=document.getElementById('step-input');
  var text=inp?inp.value.trim():''; if(!text) return;
  var t=gt(aid); if(!t) return;
  var hasCurr=t.steps.some(function(s){return s.current&&!s.done;});
  t.steps.push({id:uid(),text:text,done:false,current:!hasCurr,delegated:false,delegatedTo:null,subs:[],tags:[]});
  lg('Step added in "'+t.title+'": '+text);
  sv(); render();
  var ni=document.getElementById('step-input'); if(ni) ni.focus();
}
function toggleStep(sid) {
  var t=gt(aid); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  if(!s.done){s.done=true;s.current=false;lg('Step done in "'+t.title+'": '+s.text);sd(t);}
  else{s.done=false;lg('Step reopened in "'+t.title+'": '+s.text);sd(t);}
  sv(); render();
}
function setCurr(sid) {
  var t=gt(aid); if(!t) return;
  t.steps.forEach(function(s){s.current=false;});
  var s=t.steps.find(function(x){return x.id===sid;});
  if(s&&!s.done) s.current=true;
  sv(); renderDetail();
}
function delegSt(sid) {
  var t=gt(aid); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  if(s.delegated){
    var nm=prompt('Update delegate (blank to remove):',s.delegatedTo||'');
    if(nm===null) return;
    if(!nm.trim()){s.delegated=false;s.delegatedTo=null;lg('Delegation removed in "'+t.title+'": '+s.text);}
    else{s.delegatedTo=nm.trim();lg('Step re-delegated in "'+t.title+'": '+s.text+' в†’ '+nm.trim());}
  } else {
    var n2=prompt('Delegate to:'); if(!n2||!n2.trim()) return;
    s.delegated=true;s.delegatedTo=n2.trim();
    lg('Step delegated in "'+t.title+'": '+s.text+' в†’ '+n2.trim());
  }
  sv(); renderDetail();
}
function delStep(sid) {
  var t=gt(aid); if(!t) return;
  var idx=t.steps.findIndex(function(x){return x.id===sid;}); if(idx===-1) return;
  var text=t.steps[idx].text;
  delete xsubs[sid];
  t.steps.splice(idx,1); sd(t);
  lg('Step removed from "'+t.title+'": '+text);
  sv(); render();
}

function toggleSubs(sid){xsubs[sid]=!xsubs[sid];renderDetail();}
function addSub(sid) {
  var inp=document.getElementById('si-'+sid);
  var text=inp?inp.value.trim():''; if(!text) return;
  var t=gt(aid); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  if(!s.subs) s.subs=[];
  s.subs.push({id:uid(),text:text,done:false});
  lg('Substep added in "'+t.title+'": '+text);
  sv(); render();
  var ni=document.getElementById('si-'+sid); if(ni) ni.focus();
}
function toggleSub(sid,bid) {
  var t=gt(aid); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  var b=(s.subs||[]).find(function(x){return x.id===bid;}); if(!b) return;
  b.done=!b.done; sv(); render();
}
function delSub(sid,bid) {
  var t=gt(aid); if(!t) return;
  var s=t.steps.find(function(x){return x.id===sid;}); if(!s) return;
  s.subs=(s.subs||[]).filter(function(x){return x.id!==bid;});
  sv(); render();
}

function ds(e,idx){dragSrc=idx;e.dataTransfer.effectAllowed='move';}
function dov(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function den(e){e.preventDefault();}
function dleave(e){e.currentTarget.classList.remove('drag-over');}
function drp(e,idx){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragSrc===null||dragSrc===idx){dragSrc=null;return;}
  var t=gt(aid); if(!t) return;
  var moved=t.steps.splice(dragSrc,1)[0];t.steps.splice(idx,0,moved);
  lg('Step reordered in "'+t.title+'": '+moved.text);
  dragSrc=null;sv();renderDetail();
}
document.addEventListener('dragend',function(){dragSrc=null;});

function toggleDone(id) {
  var t=gt(id); if(!t) return;
  t.done=!t.done;
  lg(t.done?'Task done: "'+t.title+'"':'Task reopened: "'+t.title+'"');
  sv(); render();
}
function delTask(id) {
  if(!confirm('Delete this task? This cannot be undone.')) return;
  var t=gt(id);var title=t?t.title:'';
  D.tasks=D.tasks.filter(function(x){return x.id!==id;});
  if(aid===id){var vis=filteredTasks();aid=vis.length?vis[0].id:null;}
  lg('Task deleted: "'+title+'"');
  sv(); render();
}

function sel(id){
  aid=id;viewProjId=null;ctab='steps';
  if(isMob()) document.body.classList.add('mob-detail');
  render();
}
function selProj(id){
  viewProjId=id;aid=null;
  if(isMob()) document.body.classList.add('mob-detail');
  renderDetail();renderList();
}
function mobileBack(){
  document.body.classList.remove('mob-detail');
  aid=null;viewProjId=null;renderDetail();
  renderList();
}

function openModal(id) {
  editId=id||null;
  var nameEl=document.getElementById('modal-name');
  var assEl=document.getElementById('modal-assignee');
  var projSel=document.getElementById('modal-project');
  var goalSel=document.getElementById('modal-goal');
  var catSel=document.getElementById('modal-cat');
  var saveBtn=document.getElementById('modal-save');
  projSel.innerHTML='<option value="">No project</option>'+
    D.projects.map(function(p){return '<option value="'+p.id+'">'+xe(p.name)+'</option>';}).join('');
  var dueEl=document.getElementById('modal-due');
  if(editId){
    var t=gt(editId);
    document.getElementById('modal-title').textContent='Edit task';
    nameEl.value=t?t.title:'';
    assEl.value=t?(t.assignee||''):'';
    projSel.value=t?(t.projectId||''):'';
    dueEl.value=t?(t.dueDate||''):'';
    goalSel.innerHTML=buildGoalOptions(t?t.goalId:null);
    catSel.innerHTML=buildCatOptions(t?t.categoryId:null);
    editingTags=(t&&t.tags)?t.tags.slice():[];
    saveBtn.onclick=saveEdit;
  } else {
    document.getElementById('modal-title').textContent='New task';
    nameEl.value='';assEl.value='';dueEl.value='';
    /* Pre-fill project from currently open project view */
    projSel.value = viewProjId || '';
    goalSel.innerHTML=buildGoalOptions(null);
    catSel.innerHTML=buildCatOptions(null);
    editingTags=[];
    saveBtn.onclick=saveNew;
  }
  renderModalTagPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){nameEl.focus();},80);
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  editId=null; editingTags=[];
}
function saveNew() {
  var name=document.getElementById('modal-name').value.trim(); if(!name) return;
  var ass=document.getElementById('modal-assignee').value.trim();
  var projId=document.getElementById('modal-project').value||null;
  var due=document.getElementById('modal-due').value||null;
  var goalId=document.getElementById('modal-goal').value||null;
  var catId=document.getElementById('modal-cat').value||null;
  var task={id:uid(),title:name,assignee:ass,projectId:projId,dueDate:due,done:false,notes:'',
    createdAt:new Date().toISOString(),steps:[],tags:editingTags.slice(),goalId:goalId,categoryId:catId};
  D.tasks.unshift(task);aid=task.id;ctab='steps';
  lg('Task created: "'+name+'"');
  sv();closeModal();render();
  if(isMob()) document.body.classList.add('mob-detail');
}
function saveEdit() {
  var name=document.getElementById('modal-name').value.trim(); if(!name) return;
  var ass=document.getElementById('modal-assignee').value.trim();
  var projId=document.getElementById('modal-project').value||null;
  var due=document.getElementById('modal-due').value||null;
  var goalId=document.getElementById('modal-goal').value||null;
  var catId=document.getElementById('modal-cat').value||null;
  var t=gt(editId); if(!t) return;
  var old=t.title;t.title=name;t.assignee=ass;t.projectId=projId;t.dueDate=due;
  t.tags=editingTags.slice();t.goalId=goalId;t.categoryId=catId;
  lg('Task updated: "'+old+'" в†’ "'+name+'"');
  sv();closeModal();render();
}
function saveNotes() {
  var t=gt(aid); if(!t) return;
  var ta=document.getElementById('notes-input'); if(!ta) return;
  t.notes=ta.value;sv();
  var fl=document.getElementById('saved-flash');
  if(fl){fl.classList.add('show');setTimeout(function(){fl.classList.remove('show');},1700);}
}

document.addEventListener('keydown',function(e){

// в”Ђв”Ђ Sidebar resize в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(function(){
  var resizer = document.getElementById('sidebar-resizer');
  var sidebar = document.getElementById('sidebar');
  var resizing = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', function(e){
    if(window.innerWidth <= 640) return;
    resizing=true; startX=e.clientX; startW=sidebar.offsetWidth;
    document.body.classList.add('resizing');
    resizer.classList.add('resizing');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!resizing) return;
    var w = Math.min(520, Math.max(180, startW + e.clientX - startX));
    sidebar.style.width = w+'px';
  });
  document.addEventListener('mouseup', function(){
    if(!resizing) return;
    resizing=false;
    document.body.classList.remove('resizing');
    resizer.classList.remove('resizing');
    try{ localStorage.setItem('chain3_sw', sidebar.offsetWidth); }catch(e){}
  });

  // Restore saved width
  try{
    var sw = localStorage.getItem('chain3_sw');
    if(sw && window.innerWidth > 640) sidebar.style.width = sw+'px';
  }catch(e){}
})();

/* Prevent pinch-zoom and double-tap zoom in PWA */
(function(){
  document.addEventListener('touchmove', function(e){
    if(e.touches.length > 1) e.preventDefault();
  }, {passive:false});
  var lastTap = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if(now - lastTap < 300 && !e.target.closest('.tr-name')) e.preventDefault();
    lastTap = now;
  }, {passive:false});
})();

(async function(){
  /* Show loading only if no local cache exists */
  var hasLocal = !!localStorage.getItem(LOCAL_KEY);
  if (!hasLocal) {
    document.getElementById('detail').innerHTML=
      '<div class="no-detail"><i class="ti ti-loader spinning"></i><p>ConnectingвЂ¦</p></div>';
  }
  await ld();
  if (D.tasks && D.tasks.length) aid = D.tasks[0].id;
  render();
  if (navigator.onLine) startRealtime();
})();
