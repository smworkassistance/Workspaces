<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  --bg:#F2F2F7;--surface:#fff;--text:rgba(0,0,0,.88);--muted:rgba(60,60,67,.5);
  --border:rgba(60,60,67,.12);--accent:#7C6FFF;
  --nav-h:calc(49px + env(safe-area-inset-bottom,0px));
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overscroll-behavior:none}
body{
  position:fixed;width:100%;height:100%;height:100dvh;
  overflow:hidden;background:var(--bg);
  font-family:var(--font);color:var(--text);
  display:flex;flex-direction:column;
}

/* ── Month header ─────────────────────────────────────────── */
#month-header{
  flex-shrink:0;
  padding-top:env(safe-area-inset-top,0px);
  background:linear-gradient(135deg,var(--m-from),var(--m-to));
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
#month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
.mnav-btn{
  background:rgba(255,255,255,.18);border:none;border-radius:50%;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:20px;cursor:pointer;touch-action:manipulation;
  transition:background .15s;backdrop-filter:blur(6px);
}
.mnav-btn:active{background:rgba(255,255,255,.35)}
#month-label-wrap{text-align:center}
#month-name{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1}
#year-label{font-size:13px;color:rgba(255,255,255,.75);font-weight:600;margin-top:2px}
#today-btn{
  background:rgba(255,255,255,.18);border:none;border-radius:14px;
  padding:5px 11px;color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--font);touch-action:manipulation;
  backdrop-filter:blur(6px);
}
#today-btn:active{background:rgba(255,255,255,.35)}

/* Day-of-week headers */
#dow-row{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:6px 8px 8px;
}
.dow-cell{
  text-align:center;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase;
}
.dow-cell:first-child{color:rgba(255,150,150,.9)} /* Sun */
.dow-cell:last-child{color:rgba(150,220,255,.9)}  /* Sat */

/* ── Calendar grid ─────────────────────────────────────────── */
#cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
#cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;padding:6px 6px;
}
.day-cell{
  background:var(--surface);border-radius:10px;
  min-height:72px;padding:6px 5px 5px;
  cursor:pointer;touch-action:manipulation;
  transition:transform .1s,box-shadow .1s;
  position:relative;
  display:flex;flex-direction:column;align-items:center;
}
.day-cell:active{transform:scale(.94);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.day-cell.other-month{background:rgba(255,255,255,.45);opacity:.5}
.day-cell.today .day-num{
  background:var(--accent);color:#fff;border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(124,111,255,.45);
}
.day-cell.selected{
  box-shadow:0 0 0 2px var(--accent);
  background:rgba(124,111,255,.06);
}
.day-num{
  font-size:14px;font-weight:700;line-height:1;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
.day-cell.sun .day-num{color:#FF3B30}
.day-cell.sat .day-num{color:#007AFF}
.day-cell.other-month .day-num{color:var(--muted)}

/* Holiday chip */
.day-hols{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px;
  width:100%;margin-top:4px;
}
.day-hol-emoji{
  font-size:15px;line-height:1;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.15));
}

/* Task dots row */
.day-tasks{
  display:flex;flex-wrap:wrap;gap:2px;justify-content:center;
  margin-top:auto;padding-top:3px;
}
.day-task-dot{
  width:5px;height:5px;border-radius:50%;
}

/* ── Reminder banner ───────────────────────────────────────── */
#reminder-bar{
  display:none;
  background:linear-gradient(90deg,#FF9500,#FF6B00);
  color:#fff;padding:9px 16px;font-size:13px;font-weight:700;
  cursor:pointer;touch-action:manipulation;flex-shrink:0;
  animation:slide-in .3s ease;
}
@keyframes slide-in{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#reminder-bar:active{opacity:.85}

/* ── Day detail panel ──────────────────────────────────────── */
#day-panel{
  position:fixed;left:0;right:0;bottom:var(--nav-h);
  background:var(--surface);border-radius:18px 18px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.12);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:50;max-height:68vh;display:flex;flex-direction:column;
}
#day-panel.open{transform:translateY(0)}
#day-panel-handle{
  width:36px;height:4px;border-radius:2px;background:rgba(60,60,67,.18);
  margin:10px auto 0;flex-shrink:0;cursor:pointer;
}
#day-panel-head{
  display:flex;align-items:center;padding:10px 16px 8px;
  border-bottom:.5px solid var(--border);flex-shrink:0;gap:10px;
}
#day-panel-date-lbl{font-size:17px;font-weight:800;flex:1;letter-spacing:-.02em}
#day-panel-day-name{font-size:12px;color:var(--muted);font-weight:600}
#panel-ai-btn{
  background:var(--accent);color:#fff;border:none;border-radius:16px;
  padding:6px 13px;font-size:12px;font-weight:700;font-family:var(--font);
  cursor:pointer;touch-action:manipulation;display:flex;align-items:center;gap:5px;
}
#panel-ai-btn:active{opacity:.8}
#day-panel-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 16px}

/* Event rows */
.event-row{
  display:flex;align-items:flex-start;gap:10px;padding:9px 0;
  border-bottom:.5px solid var(--border);
}
.event-row:last-child{border-bottom:none}
.event-emoji{font-size:20px;flex-shrink:0;line-height:1.3}
.event-info{flex:1}
.event-name{font-size:14px;font-weight:700;color:var(--text)}
.event-type-chip{
  display:inline-block;font-size:10px;font-weight:700;
  border-radius:8px;padding:1px 7px;margin-top:3px;
  text-transform:uppercase;letter-spacing:.05em;
}
.task-event-row{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:.5px solid var(--border);cursor:pointer;
  touch-action:manipulation;
}
.task-event-row:last-child{border-bottom:none}
.task-event-row:active{opacity:.7}
.task-ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.task-ev-name{font-size:14px;font-weight:600;flex:1;color:var(--text)}
.task-ev-proj{font-size:11px;color:var(--muted);font-weight:500}
.task-ev-done{text-decoration:line-through;color:var(--muted)}
.panel-section-lbl{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin:12px 0 6px;
}
.empty-day{text-align:center;padding:24px 0;color:var(--muted);font-size:14px}

/* ── Mini AI Chat ──────────────────────────────────────────── */
#ai-chat-panel{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;background:var(--bg);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#ai-chat-panel.open{transform:translateY(0)}
#ai-chat-topbar{
  padding-top:env(safe-area-inset-top,0px);
  background:linear-gradient(135deg,var(--m-from),var(--m-to));
  flex-shrink:0;
}
#ai-chat-head{
  display:flex;align-items:center;padding:12px 16px;gap:10px;
}
#ai-chat-back{
  background:rgba(255,255,255,.18);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;cursor:pointer;touch-action:manipulation;
}
#ai-chat-title{font-size:16px;font-weight:700;color:#fff;flex:1}
#ai-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:88%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5}
.ai-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.ai-msg.ai{align-self:flex-start;background:var(--surface);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.ai-msg.thinking{color:var(--muted);font-style:italic}
#ai-input-row{
  display:flex;gap:8px;padding:10px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  background:var(--surface);border-top:.5px solid var(--border);flex-shrink:0;
}
#ai-input{
  flex:1;border:1.5px solid var(--border);border-radius:20px;
  padding:9px 14px;font-size:14px;font-family:var(--font);
  background:var(--bg);outline:none;color:var(--text);
}
#ai-input:focus{border-color:var(--accent)}
#ai-send{
  background:var(--accent);color:#fff;border:none;border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;touch-action:manipulation;flex-shrink:0;
}
#ai-send:active{opacity:.8}

/* ── Bottom Nav ─────────────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(242,242,247,.96);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid rgba(60,60,67,.18);display:flex;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;color:rgba(60,60,67,.4);text-decoration:none;
  font-size:10px;font-weight:600;letter-spacing:.02em;padding-top:6px;
  touch-action:manipulation;
}
.bn-item i{font-size:22px;line-height:1}
.bn-item.active{color:var(--accent)}
</style>

  {from:'#EF9A9A',to:'#880E4F'},  /* Dec - Christmas */
];

/* ── State ────────────────────────────────────────────────────── */
var today = new Date();
var curYear  = today.getFullYear();
var curMonth = today.getMonth(); /* 0-based */
var selectedDate = null; /* 'YYYY-MM-DD' */
var aiChatLog = [];

/* ── Helpers ─────────────────────────────────────────────────── */
var MONTH_NAMES = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
var DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function pad(n){ return n < 10 ? '0'+n : ''+n; }
function dateStr(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function todayStr(){ return dateStr(today.getFullYear(),today.getMonth(),today.getDate()); }
function xe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function holidaysOn(ds){
  return HOLIDAYS.filter(function(h){ return h.d===ds; });
}
function tasksOn(ds){
  return D.tasks.filter(function(t){ return t.dueDate===ds; });
}
function projColor(pid){
  if(!pid) return '#8B8BA7';
  var p = D.projects.find(function(p){ return p.id===pid; });
  return p ? p.color : '#8B8BA7';
}
function projName(pid){
  if(!pid) return 'My Tasks';
  var p = D.projects.find(function(p){ return p.id===pid; });
  return p ? p.name : '';
}

/* ── Set month gradient CSS vars ─────────────────────────────── */
function applyTheme(m){
  var t = MONTH_THEMES[m];
  document.documentElement.style.setProperty('--m-from', t.from);
  document.documentElement.style.setProperty('--m-to',   t.to);
  document.querySelector('meta[name="theme-color"]').content = t.from;
}

/* ── Render calendar ─────────────────────────────────────────── */
function renderCalendar(){
  applyTheme(curMonth);
  document.getElementById('month-name').textContent = MONTH_NAMES[curMonth];
  document.getElementById('year-label').textContent  = curYear;

  var firstDay = new Date(curYear, curMonth, 1).getDay(); /* 0=Sun */
  var daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  var daysInPrev  = new Date(curYear, curMonth, 0).getDate();

  var td = todayStr();
  var grid = document.getElementById('cal-grid');
  var cells = '';
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for(var i=0; i<totalCells; i++){
    var dayNum, yr, mo, isOther=false;
    if(i < firstDay){
      var d = daysInPrev - firstDay + i + 1;
      var pm = curMonth === 0 ? 11 : curMonth-1;
      yr = curMonth===0 ? curYear-1 : curYear;
      mo = pm; dayNum = d; isOther=true;
    } else if(i >= firstDay + daysInMonth){
      dayNum = i - firstDay - daysInMonth + 1;
      yr = curMonth===11 ? curYear+1 : curYear;
      mo = curMonth===11 ? 0 : curMonth+1; isOther=true;
    } else {
      dayNum = i - firstDay + 1; yr=curYear; mo=curMonth;
    }
    var ds = dateStr(yr, mo, dayNum);
    var dow = i % 7; /* 0=Sun,6=Sat */
    var isToday = ds===td;
    var isSel   = ds===selectedDate;
    var hols    = holidaysOn(ds);
    var tasks   = tasksOn(ds);

    var cls = 'day-cell'+(isOther?' other-month':'')+(isToday?' today':'')+(isSel?' selected':'')+(dow===0?' sun':dow===6?' sat':'');
    cells += '<div class="'+cls+'" onclick="selectDay(\''+ds+'\')" data-ds="'+ds+'">';
    cells += '<div class="day-num">'+dayNum+'</div>';

    /* Holiday indicators — emoji only in cell, full name in day panel */
    if(hols.length){
      cells += '<div class="day-hols">';
      hols.slice(0,3).forEach(function(h){
        cells += '<span class="day-hol-emoji" title="'+xe(h.n)+'">'+h.e+'</span>';
      });
      cells += '</div>';
    }

    /* Task dots */
    if(tasks.length){
      cells += '<div class="day-tasks">';
      tasks.slice(0,5).forEach(function(t){
        cells += '<div class="day-task-dot" style="background:'+projColor(t.projectId)+'"></div>';
      });
      cells += '</div>';
    }
    cells += '</div>';
  }
  grid.innerHTML = cells;
}

/* ── Select a day ────────────────────────────────────────────── */
function selectDay(ds){
  selectedDate = ds;
  renderCalendar();
  renderDayPanel(ds);
  document.getElementById('day-panel').classList.add('open');
}
function closeDayPanel(){
  document.getElementById('day-panel').classList.remove('open');
}

function renderDayPanel(ds){
  var parts = ds.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var label = DAY_NAMES[d.getDay()]+', '+MONTH_NAMES[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  var isT = ds === todayStr();
  document.getElementById('day-panel-date-lbl').textContent = (isT?'Today — ':'')+MONTH_NAMES[d.getMonth()]+' '+d.getDate();
  document.getElementById('day-panel-day-name').textContent = DAY_NAMES[d.getDay()]+', '+d.getFullYear();

  var hols  = holidaysOn(ds);
  var tasks = tasksOn(ds);
  var html  = '';

  if(!hols.length && !tasks.length){
    html = '<div class="empty-day"><i class="ti ti-calendar-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.35"></i>Nothing scheduled</div>';
  }

  if(hols.length){
    html += '<div class="panel-section-lbl">Holidays & Festivals</div>';
    hols.forEach(function(h){
      var ht = HTYPE[h.t]||HTYPE.other;
      html += '<div class="event-row">';
      html += '<div class="event-emoji">'+h.e+'</div>';
      html += '<div class="event-info">';
      html += '<div class="event-name">'+xe(h.n)+'</div>';
      html += '<div class="event-type-chip" style="background:'+ht.bg+';color:'+ht.color+'">'+xe(h.t)+'</div>';
      html += '</div></div>';
    });
  }

  if(tasks.length){
    html += '<div class="panel-section-lbl">Tasks Due</div>';
    tasks.forEach(function(t){
      var color = projColor(t.projectId);
      var pname = projName(t.projectId);
      html += '<div class="task-event-row">';
      html += '<div class="task-ev-dot" style="background:'+color+'"></div>';
      html += '<div style="flex:1"><div class="task-ev-name'+(t.done?' task-ev-done':'')+'">'+xe(t.title)+'</div>';
      if(pname) html += '<div class="task-ev-proj">'+xe(pname)+'</div>';
      html += '</div>';
      if(t.done) html += '<i class="ti ti-check" style="color:#34C759;font-size:16px"></i>';
      html += '</div>';
    });
  }

  document.getElementById('day-panel-inner').innerHTML = html;
}

/* ── Month navigation ────────────────────────────────────────── */
function changeMonth(dir){
  curMonth += dir;
  if(curMonth < 0){ curMonth=11; curYear--; }
  if(curMonth > 11){ curMonth=0;  curYear++; }
  closeDayPanel();
  renderCalendar();
}
function jumpToToday(){
  curYear  = today.getFullYear();
  curMonth = today.getMonth();
  closeDayPanel();
  renderCalendar();
  setTimeout(function(){ selectDay(todayStr()); }, 80);
}

/* ── Reminder banner ─────────────────────────────────────────── */
function checkReminders(){
  var td = todayStr();
  var due = D.tasks.filter(function(t){ return t.dueDate===td && !t.done; });
  if(due.length){
    var bar = document.getElementById('reminder-bar');
    bar.style.display = 'block';
    document.getElementById('reminder-text').textContent =
      due.length+' task'+(due.length>1?'s':'')+' due today — tap to view';
  }
}

/* ── Mini AI Chat ────────────────────────────────────────────── */
function openAIChat(){
  if(!selectedDate) return;
  var panel = document.getElementById('ai-chat-panel');
  var parts = selectedDate.split('-');
  var d = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var label = DAY_NAMES[d.getDay()]+', '+MONTH_NAMES[d.getMonth()]+' '+d.getDate();
  document.getElementById('ai-chat-title').textContent = '⚡ Chain AI';
  document.getElementById('ai-chat-date-tag').textContent = label;
  panel.classList.add('open');

  /* Pre-fill context message if chat is empty */
  if(aiChatLog.length===0){
    var hols  = holidaysOn(selectedDate);
    var tasks = tasksOn(selectedDate);
    var ctx = 'Date: '+label+'.';
    if(hols.length) ctx += ' Holidays/Festivals: '+hols.map(function(h){return h.n;}).join(', ')+'.';
    if(tasks.length) ctx += ' Tasks due: '+tasks.map(function(t){return (t.done?'[done] ':'')+t.title;}).join(', ')+'.';
    var allTasks = D.tasks.filter(function(t){return !t.done;}).slice(0,12);
    if(allTasks.length) ctx += ' Active tasks in Chain: '+allTasks.map(function(t){return t.title;}).join(', ')+'.';
    sendAIMessage('Give me a quick plan for '+label+'. '+ctx, true);
  }
}
function closeAIChat(){
  document.getElementById('ai-chat-panel').classList.remove('open');
}

var aiSending = false;
function sendAI(){
  var inp = document.getElementById('ai-input');
  var msg = inp.value.trim();
  if(!msg || aiSending) return;
  inp.value = '';
  sendAIMessage(msg, false);
}

function sendAIMessage(msg, isAuto){
  aiChatLog.push({role:'user', content:msg});
  renderAIMessages();
  aiSending = true;
  /* Add thinking indicator */
  var thinking = document.createElement('div');
  thinking.className = 'ai-msg ai thinking'; thinking.id='ai-thinking';
  thinking.textContent = '⚡ thinking…';
  document.getElementById('ai-messages').appendChild(thinking);
  scrollAIToBottom();

  /* Build system prompt with calendar context */
  var sysParts = D.projects && D.projects.length
    ? D.projects.map(function(p){ return p.name+(p.notes?' ('+p.notes+')':''); }).join('; ')
    : 'No projects yet';
  var sysPrompt = 'You are Chain AI embedded in a calendar view. The user is viewing their Chain task manager calendar. Projects: '+sysParts+'. Help the user plan and prioritize their day. Be brief, specific, and end with one Next Chain action.';

  var contents = aiChatLog.map(function(m){
    return {role:m.role==='user'?'user':'model', parts:[{text:m.content}]};
  });

  fetch(WORKER_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      _model:'gemini-2.5-flash',
      system_instruction:{parts:[{text:sysPrompt}]},
      contents:contents,
      generationConfig:{maxOutputTokens:2048, temperature:0.7}
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    var text = j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts
      ? j.candidates[0].content.parts[0].text : '(no response)';
    var el = document.getElementById('ai-thinking');
    if(el) el.remove();
    aiChatLog.push({role:'ai', content:text});
    renderAIMessages(); scrollAIToBottom();
    aiSending = false;
  })
  .catch(function(e){
    var el = document.getElementById('ai-thinking');
    if(el) el.remove();
    aiChatLog.push({role:'ai', content:'Sorry, could not reach AI. Check your connection.'});
    renderAIMessages(); scrollAIToBottom();
    aiSending = false;
  });
}

function renderAIMessages(){
  var el = document.getElementById('ai-messages');
  el.innerHTML = aiChatLog.map(function(m){
    return '<div class="ai-msg '+m.role+'">'+xe(m.content).replace(/\n/g,'<br>')+'</div>';
  }).join('');
}
function scrollAIToBottom(){
  var el = document.getElementById('ai-messages');
  setTimeout(function(){ el.scrollTop = el.scrollHeight; }, 50);
}

/* ── Load data & init ────────────────────────────────────────── */
(async function(){
  try {
    var r = await db.from('chain_state').select('data').eq('id','main').maybeSingle();
    if(r.data && r.data.data){
      D = r.data.data;
      if(!D.tasks)    D.tasks    = [];
      if(!D.projects) D.projects = [];
    }
  } catch(e){ console.error(e); }
  renderCalendar();
  checkReminders();
  /* Select today by default */
  var td = todayStr();
  var todayCell = document.querySelector('[data-ds="'+td+'"]');
  if(todayCell) setTimeout(function(){ selectDay(td); }, 200);
})();
</script>
