<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain — Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three-spritetext@1/dist/three-spritetext.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08081A;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh}

/* Topbar */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(8,8,26,.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:20}
.btn-back{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.55);text-decoration:none;font-size:13px;font-weight:500;padding:5px 10px;border-radius:6px;transition:all .12s}
.btn-back:hover{background:rgba(255,255,255,.08);color:#fff}
.topbar-divider{width:1px;height:20px;background:rgba(255,255,255,.1)}
.topbar-title{font-size:14px;font-weight:500;color:rgba(255,255,255,.7)}
#loading-msg{margin-left:auto;font-size:12px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .9s linear infinite;display:inline-block}

/* Hint */
#hint{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(124,111,255,.15);border:1px solid rgba(124,111,255,.3);border-radius:20px;padding:5px 14px;font-size:11px;color:rgba(255,255,255,.6);pointer-events:none;transition:opacity .5s;z-index:15}
#hint.hide{opacity:0}

/* Graph */
#graph{position:fixed;inset:0;top:48px}

/* Side panel */
#panel{position:fixed;right:0;top:48px;bottom:0;width:300px;background:rgba(10,10,22,.96);backdrop-filter:blur(14px);border-left:1px solid rgba(255,255,255,.07);padding:20px;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:20}
#panel.open{transform:translateX(0)}
.panel-close{float:right;background:transparent;border:none;color:rgba(255,255,255,.35);font-size:20px;cursor:pointer;line-height:1;padding:0;transition:color .12s}
.panel-close:hover{color:#fff}
.panel-proj-tag{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:12px}
.panel-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:12px;line-height:1.35}
.panel-meta{font-size:12px;color:#D97706;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.panel-prog-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.35);margin-bottom:4px}
.panel-prog-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:14px;overflow:hidden}
.panel-prog-fill{height:100%;border-radius:2px}
.panel-curr{background:rgba(124,111,255,.12);border:1px solid rgba(124,111,255,.22);border-radius:8px;padding:10px;margin-bottom:14px}
.panel-curr-label{font-size:10px;color:#7C6FFF;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.panel-curr-text{font-size:12px;color:rgba(255,255,255,.85);line-height:1.4}
.panel-curr-deleg{font-size:11px;color:#D97706;margin-top:4px}
.panel-steps-label{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:8px}
.panel-step{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.panel-step-check{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0;margin-top:2px}
.panel-step-check.done{background:#16A37F;border-color:#16A37F}
.panel-step-text{font-size:12px;color:rgba(255,255,255,.8);line-height:1.4}
.panel-step-text.done{text-decoration:line-through;opacity:.45}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.proj-task-card{background:rgba(255,255,255,.04);border-radius:6px;padding:8px 10px;margin-bottom:6px}
.proj-task-name{font-size:12px;color:#fff;margin-bottom:5px}
.mini-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px}

/* Legend */
#legend{position:fixed;bottom:16px;left:16px;background:rgba(10,10,22,.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;z-index:15;font-size:11px;color:rgba(255,255,255,.55)}
.leg{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg:last-child{margin-bottom:0}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-line{width:18px;height:2px;flex-shrink:0}

/* Empty */
#empty{display:none;position:fixed;inset:0;top:48px;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(255,255,255,.3);text-align:center;padding:40px}
#empty i{font-size:48px;opacity:.3}
#empty p{font-size:14px}
</style>
</head>
<body>

<div id="topbar">
  <a href="chain.html" class="btn-back"><i class="ti ti-arrow-left"></i> Chain</a>
  <div class="topbar-divider"></div>
  <span class="topbar-title">Map View</span>
  <div id="loading-msg"><i class="ti ti-loader spinning"></i> Loading…</div>
</div>

<div id="hint">Click any node to see details &nbsp;·&nbsp; Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>

<div id="graph"></div>

<div id="empty">
  <i class="ti ti-circuit-diode"></i>
  <p>No tasks yet.<br>Add some in Chain to see the map.</p>
</div>

<div id="panel">
  <div id="panel-content"></div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#7C6FFF"></div> Active task</div>
  <div class="leg"><div class="leg-dot" style="background:#16A37F"></div> Done</div>
  <div class="leg"><div class="leg-dot" style="background:#D97706"></div> Has delegation</div>
  <div class="leg"><div class="leg-dot" style="background:#fff;opacity:.6"></div> Project</div>
  <div class="leg"><div class="leg-line" style="background:#D97706"></div> Same person</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────
var SUPABASE_URL = 'https://ienfjretjvoupzwncnjb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllbmZqcmV0anZvdXB6d25jbmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTU4NjcsImV4cCI6MjA5NzM3MTg2N30.zItQB5JjKGaM2gGR4eJWBGX4WGgvc1CEYG9Z1I7yU2A';

var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var D = {tasks:[],log:[],projects:[]};
var Graph;

function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function pct(t){
  var done=0,total=0;
  t.steps.forEach(function(s){total++;if(s.done)done++;(s.subs||[]).forEach(function(b){total++;if(b.done)done++;});});
  return total?Math.round(done/total*100):0;
}

function taskColor(t){
  if(t.done) return '#16A37F';
  if(t.steps.some(function(s){return s.delegated;})) return '#D97706';
  return '#7C6FFF';
}

function gp(id){return D.projects.find(function(p){return p.id===id;});}

// ── Build graph data ──────────────────────────────────────
function buildGraph(){
  var nodes=[], links=[];

  // Self
  nodes.push({id:'__self', name:'Me', type:'self', color:'#7C6FFF', val:28});

  // Projects
  D.projects.forEach(function(p){
    nodes.push({id:p.id, name:p.name, type:'project', color:p.color, val:16, proj:p});
    links.push({source:'__self', target:p.id, color:p.color+'55', lw:1.5, type:'h'});
  });

  // Tasks
  D.tasks.forEach(function(t){
    var c = taskColor(t);
    nodes.push({id:t.id, name:t.title, type:'task', color:c, val:9, task:t});
    var parent = t.projectId || '__self';
    var lc = t.projectId ? ((gp(t.projectId)||{}).color||'#8B8BA7')+'88' : '#8B8BA755';
    links.push({source:parent, target:t.id, color:lc, lw:1, type:'h'});
  });

  // Cross — same assignee
  var amap={};
  D.tasks.forEach(function(t){
    if(!t.assignee) return;
    var k=t.assignee.toLowerCase().trim();
    if(!amap[k]) amap[k]=[];
    amap[k].push(t.id);
  });
  Object.keys(amap).forEach(function(k){
    var ids=amap[k]; if(ids.length<2) return;
    for(var i=0;i<ids.length-1;i++)
      links.push({source:ids[i],target:ids[i+1],color:'#D97706',lw:1.5,type:'person',particles:2});
  });

  // Cross — same delegatee
  var dmap={};
  D.tasks.forEach(function(t){
    t.steps.forEach(function(s){
      if(!s.delegated||!s.delegatedTo) return;
      var k=s.delegatedTo.toLowerCase().trim();
      if(!dmap[k]) dmap[k]=[];
      if(dmap[k].indexOf(t.id)===-1) dmap[k].push(t.id);
    });
  });
  Object.keys(dmap).forEach(function(k){
    var ids=dmap[k]; if(ids.length<2) return;
    for(var i=0;i<ids.length-1;i++)
      links.push({source:ids[i],target:ids[i+1],color:'#D9770688',lw:1,type:'deleg',particles:1});
  });

  return {nodes:nodes, links:links};
}

// ── Init 3D graph ─────────────────────────────────────────
function initGraph(data){
  var el = document.getElementById('graph');
  Graph = ForceGraph3D()(el)
    .backgroundColor('#08081A')
    .graphData(data)
    .nodeLabel(function(){ return ''; })
    .nodeColor('color')
    .nodeVal('val')
    .nodeOpacity(0.92)
    .nodeThreeObjectExtend(true)
    .nodeThreeObject(function(n){
      var sp = new SpriteText(n.name);
      sp.color = n.type==='self' ? '#fff' : 'rgba(255,255,255,0.78)';
      sp.textHeight = n.type==='self'?6.5 : n.type==='project'?5 : 3.8;
      sp.position.y = (n.val||8)*1.6+5;
      return sp;
    })
    .linkColor('color')
    .linkWidth('lw')
    .linkOpacity(1)
    .linkDirectionalParticles('particles')
    .linkDirectionalParticleColor('color')
    .linkDirectionalParticleSpeed(0.0045)
    .linkDirectionalParticleWidth(2)
    .onNodeClick(function(node){ showPanel(node); hideHint(); })
    .onBackgroundClick(closePanel);

  document.getElementById('loading-msg').style.display='none';

  if (!D.tasks.length && !D.projects.length) {
    document.getElementById('empty').style.display='flex';
  }
}

// ── Panel ─────────────────────────────────────────────────
function showPanel(node){
  var c = document.getElementById('panel-content');
  var closeBtn = '<button class="panel-close" onclick="closePanel()">×</button>';

  if(node.type==='self'){
    var active=D.tasks.filter(function(t){return!t.done;}).length;
    var done=D.tasks.filter(function(t){return t.done;}).length;
    c.innerHTML = closeBtn+
      '<div style="font-size:32px;margin-bottom:10px">👤</div>'+
      '<div style="font-size:18px;font-weight:600;color:#fff;margin-bottom:16px">You</div>'+
      '<div class="stat-row">'+
        '<div class="stat-box" style="background:rgba(124,111,255,.12)"><div class="stat-num" style="color:#7C6FFF">'+active+'</div><div class="stat-lbl">Active</div></div>'+
        '<div class="stat-box" style="background:rgba(22,163,127,.12)"><div class="stat-num" style="color:#16A37F">'+done+'</div><div class="stat-lbl">Done</div></div>'+
        '<div class="stat-box" style="background:rgba(255,255,255,.06)"><div class="stat-num" style="color:#fff">'+D.projects.length+'</div><div class="stat-lbl">Projects</div></div>'+
      '</div>';
  }

  else if(node.type==='project'){
    var p=node.proj;
    var ptasks=D.tasks.filter(function(t){return t.projectId===p.id;});
    var avg=ptasks.length?Math.round(ptasks.reduce(function(s,t){return s+pct(t);},0)/ptasks.length):0;
    c.innerHTML = closeBtn+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
        '<div style="width:16px;height:16px;border-radius:50%;background:'+p.color+'"></div>'+
        '<div style="font-size:18px;font-weight:600;color:#fff">'+xe(p.name)+'</div>'+
      '</div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:8px">'+ptasks.length+' tasks &nbsp;·&nbsp; '+avg+'% overall</div>'+
      '<div class="panel-prog-bar" style="margin-bottom:16px"><div class="panel-prog-fill" style="width:'+avg+'%;background:'+p.color+'"></div></div>'+
      ptasks.map(function(t){
        var pp=pct(t);
        return '<div class="proj-task-card"><div class="proj-task-name">'+xe(t.title)+'</div>'+
          '<div class="mini-bar"><div class="mini-fill" style="width:'+pp+'%;background:'+(t.done?'#16A37F':'#7C6FFF')+'"></div></div></div>';
      }).join('');
  }

  else if(node.type==='task'){
    var t=node.task;
    var proj=t.projectId?gp(t.projectId):null;
    var pp=pct(t);
    var curr=t.steps.find(function(s){return s.current&&!s.done;});
    var doneS=t.steps.filter(function(s){return s.done;}).length;
    c.innerHTML = closeBtn+
      (proj
        ?'<div class="panel-proj-tag" style="background:'+proj.color+'20;border:1px solid '+proj.color+'44;color:'+proj.color+'">'+xe(proj.name)+'</div>'
        :'<div style="font-size:11px;color:rgba(255,255,255,.25);margin-bottom:10px">No project</div>')+
      '<div class="panel-title">'+xe(t.title)+'</div>'+
      (t.assignee?'<div class="panel-meta"><i class="ti ti-user"></i>'+xe(t.assignee)+'</div>':'')+
      '<div class="panel-prog-label"><span>Progress</span><span>'+pp+'%</span></div>'+
      '<div class="panel-prog-bar"><div class="panel-prog-fill" style="width:'+pp+'%;background:'+(t.done?'#16A37F':'#7C6FFF')+'"></div></div>'+
      (curr
        ?'<div class="panel-curr"><div class="panel-curr-label">CURRENT STEP</div>'+
          '<div class="panel-curr-text">'+xe(curr.text)+'</div>'+
          (curr.delegatedTo?'<div class="panel-curr-deleg">→ '+xe(curr.delegatedTo)+'</div>':'')+
          '</div>'
        :'')+
      '<div class="panel-steps-label">'+doneS+' / '+t.steps.length+' steps</div>'+
      t.steps.map(function(s){
        return '<div class="panel-step">'+
          '<div class="panel-step-check'+(s.done?' done':'')+'"></div>'+
          '<span class="panel-step-text'+(s.done?' done':'')+'">'+xe(s.text)+'</span>'+
        '</div>';
      }).join('');
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel(){document.getElementById('panel').classList.remove('open');}

var hintHidden=false;
function hideHint(){
  if(hintHidden) return; hintHidden=true;
  document.getElementById('hint').classList.add('hide');
}

// ── Load + realtime ───────────────────────────────────────
async function init(){
  var res = await db.from('chain_state').select('data').eq('id','main').maybeSingle();
  if(res.data){
    D = res.data.data || {tasks:[],log:[],projects:[]};
    if(!D.tasks) D.tasks=[];
    if(!D.log) D.log=[];
    if(!D.projects) D.projects=[];
  }
  initGraph(buildGraph());

  // Auto-hide hint after 4s
  setTimeout(function(){ document.getElementById('hint').classList.add('hide'); }, 4000);

  db.channel('map_sync')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'chain_state',filter:'id=eq.main'},
      function(payload){
        if(!payload.new) return;
        D=payload.new.data||{tasks:[],log:[],projects:[]};
        if(!D.tasks) D.tasks=[];
        if(!D.projects) D.projects=[];
        if(Graph) Graph.graphData(buildGraph());
      })
    .subscribe();
}

init();
</script>
</body>
</html>
