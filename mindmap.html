<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain — Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08081A;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh}

#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(8,8,26,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:20}
.btn-back{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.55);text-decoration:none;font-size:13px;font-weight:500;padding:5px 10px;border-radius:6px;transition:all .12s}
.btn-back:hover{background:rgba(255,255,255,.08);color:#fff}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.1)}
.tb-title{font-size:14px;font-weight:500;color:rgba(255,255,255,.6)}
#status{margin-left:auto;font-size:12px;color:rgba(255,255,255,.3)}

#graph{position:absolute;top:48px;left:0;right:0;bottom:0}

#hint{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(124,111,255,.15);border:1px solid rgba(124,111,255,.3);border-radius:20px;padding:5px 16px;font-size:11px;color:rgba(255,255,255,.55);pointer-events:none;z-index:15;transition:opacity .6s}
#hint.hide{opacity:0}

/* Panel */
#panel{position:fixed;right:0;top:48px;bottom:0;width:290px;background:rgba(8,8,26,.97);backdrop-filter:blur(14px);border-left:1px solid rgba(255,255,255,.08);padding:18px;transform:translateX(100%);transition:transform .22s ease;overflow-y:auto;z-index:20}
#panel.open{transform:translateX(0)}
.pcls{float:right;background:transparent;border:none;color:rgba(255,255,255,.3);font-size:22px;cursor:pointer;line-height:1;transition:color .12s}
.pcls:hover{color:#fff}
.ptag{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:10px}
.ptitle{font-size:16px;font-weight:600;color:#fff;margin-bottom:10px;line-height:1.35;clear:both}
.pmeta{font-size:12px;color:#D97706;margin-bottom:10px}
.pbar-wrap{margin-bottom:14px}
.pbar-lbl{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.3);margin-bottom:4px}
.pbar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px}
.pcurr{background:rgba(124,111,255,.12);border:1px solid rgba(124,111,255,.2);border-radius:8px;padding:10px;margin-bottom:12px}
.pcurr-lbl{font-size:10px;color:#7C6FFF;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.pcurr-txt{font-size:12px;color:rgba(255,255,255,.8);line-height:1.4}
.pcurr-del{font-size:11px;color:#D97706;margin-top:3px}
.pstep-lbl{font-size:11px;color:rgba(255,255,255,.28);margin-bottom:6px}
.pstep{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.pstep-c{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);flex-shrink:0;margin-top:2px}
.pstep-c.dk{background:#16A37F;border-color:#16A37F}
.pstep-t{font-size:12px;color:rgba(255,255,255,.75);line-height:1.4}
.pstep-t.dk{text-decoration:line-through;opacity:.4}
.srow{display:flex;gap:8px;margin-bottom:14px}
.sbox{flex:1;border-radius:8px;padding:10px 6px;text-align:center}
.snum{font-size:20px;font-weight:700}
.slbl{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.ptcard{background:rgba(255,255,255,.04);border-radius:6px;padding:8px;margin-bottom:5px}
.ptname{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:4px}
.mbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.mfill{height:100%;border-radius:2px}

/* Legend */
#legend{position:fixed;bottom:16px;left:16px;background:rgba(8,8,26,.88);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 13px;z-index:15;font-size:11px;color:rgba(255,255,255,.45)}
.leg{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg:last-child{margin-bottom:0}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lline{width:16px;height:2px;flex-shrink:0}

/* empty */
#empty{display:none;position:fixed;inset:0;top:48px;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,.25);text-align:center}
#empty i{font-size:44px}
#empty p{font-size:13px;line-height:1.6}
</style>
</head>
<body>

<div id="topbar">
  <a href="chain.html" class="btn-back"><i class="ti ti-arrow-left"></i> Chain</a>
  <div class="tb-sep"></div>
  <span class="tb-title">Map</span>
  <span id="status">Loading…</span>
</div>

<div id="hint">Click a node for details &nbsp;·&nbsp; Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
<div id="graph"></div>
<div id="empty"><i class="ti ti-circuit-diode"></i><p>No data yet.<br>Add tasks in Chain first.</p></div>

<div id="panel"><div id="pc"></div></div>

<div id="legend">
  <div class="leg"><div class="ldot" style="background:#7C6FFF"></div>Active task</div>
  <div class="leg"><div class="ldot" style="background:#16A37F"></div>Done</div>
  <div class="leg"><div class="ldot" style="background:#D97706"></div>Has delegation</div>
  <div class="leg"><div class="ldot" style="background:rgba(255,255,255,.5)"></div>Project</div>
  <div class="leg"><div class="lline" style="background:#D97706"></div>Same person</div>
</div>

<script>
var SUPABASE_URL = 'https://ienfjretjvoupzwncnjb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllbmZqcmV0anZvdXB6d25jbmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTU4NjcsImV4cCI6MjA5NzM3MTg2N30.zItQB5JjKGaM2gGR4eJWBGX4WGgvc1CEYG9Z1I7yU2A';

var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var D = {tasks:[],log:[],projects:[]};
var Graph = null;

function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pct(t){var d=0,tot=0;t.steps.forEach(function(s){tot++;if(s.done)d++;(s.subs||[]).forEach(function(b){tot++;if(b.done)d++;});});return tot?Math.round(d/tot*100):0;}
function gp(id){return D.projects.find(function(p){return p.id===id;});}
function taskColor(t){if(t.done)return'#16A37F';if(t.steps.some(function(s){return s.delegated;}))return'#D97706';return'#7C6FFF';}

function makeLabel(text, size, color) {
  var c = document.createElement('canvas');
  var maxW = 256, h = size * 2.2;
  c.width = maxW; c.height = h;
  var ctx = c.getContext('2d');
  ctx.font = 'bold '+size+'px sans-serif';
  var label = text.length > 22 ? text.slice(0,20)+'…' : text;
  ctx.fillStyle = color || 'rgba(255,255,255,0.85)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, maxW/2, h/2);
  return c;
}

function buildGraph() {
  var nodes = [], links = [];

  nodes.push({id:'__self', name:'Me', type:'self', color:'#7C6FFF', val:28});

  D.projects.forEach(function(p){
    nodes.push({id:p.id, name:p.name, type:'project', color:p.color, val:16, proj:p});
    links.push({source:'__self', target:p.id, color:p.color+'66', lw:1.5, par:0});
  });

  D.tasks.forEach(function(t){
    nodes.push({id:t.id, name:t.title, type:'task', color:taskColor(t), val:9, task:t});
    var par = t.projectId || '__self';
    var lc = t.projectId ? ((gp(t.projectId)||{}).color||'#8B8BA7')+'77' : '#8B8BA755';
    links.push({source:par, target:t.id, color:lc, lw:1, par:0});
  });

  // Same assignee connections
  var amap = {};
  D.tasks.forEach(function(t){
    if(!t.assignee) return;
    var k = t.assignee.toLowerCase().trim();
    if(!amap[k]) amap[k] = [];
    amap[k].push(t.id);
  });
  Object.keys(amap).forEach(function(k){
    var ids = amap[k]; if(ids.length < 2) return;
    for(var i=0;i<ids.length-1;i++)
      links.push({source:ids[i], target:ids[i+1], color:'#D97706', lw:1.5, par:3});
  });

  // Same delegatee connections
  var dmap = {};
  D.tasks.forEach(function(t){
    t.steps.forEach(function(s){
      if(!s.delegated||!s.delegatedTo) return;
      var k = s.delegatedTo.toLowerCase().trim();
      if(!dmap[k]) dmap[k] = [];
      if(dmap[k].indexOf(t.id)===-1) dmap[k].push(t.id);
    });
  });
  Object.keys(dmap).forEach(function(k){
    var ids = dmap[k]; if(ids.length < 2) return;
    for(var i=0;i<ids.length-1;i++)
      links.push({source:ids[i], target:ids[i+1], color:'#D9770688', lw:1, par:1});
  });

  return {nodes:nodes, links:links};
}

function initGraph(data) {
  var el = document.getElementById('graph');
  var w = el.offsetWidth || window.innerWidth;
  var h = el.offsetHeight || (window.innerHeight - 48);

  Graph = ForceGraph3D()(el)
    .width(w)
    .height(h)
    .backgroundColor('#08081A')
    .graphData(data)
    .nodeLabel('name')
    .nodeColor('color')
    .nodeVal('val')
    .nodeOpacity(0.92)
    .nodeThreeObjectExtend(true)
    .nodeThreeObject(function(n) {
      try {
        var THREE = window.THREE || (Graph && Graph.scene && Graph.scene().userData && Graph.scene().userData.THREE);
        if (!THREE) return null;
        var canvas = makeLabel(n.name, n.type==='self'?22:n.type==='project'?18:13, n.type==='self'?'#fff':'rgba(255,255,255,0.8)');
        var tex = new THREE.CanvasTexture(canvas);
        var mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
        var sprite = new THREE.Sprite(mat);
        var scale = n.type==='self'?36:n.type==='project'?28:22;
        sprite.scale.set(scale, scale*0.3, 1);
        sprite.position.set(0, (n.val||5)*1.8+6, 0);
        return sprite;
      } catch(e) { return null; }
    })
    .linkColor('color')
    .linkWidth('lw')
    .linkOpacity(0.85)
    .linkDirectionalParticles('par')
    .linkDirectionalParticleColor('color')
    .linkDirectionalParticleSpeed(0.004)
    .linkDirectionalParticleWidth(2)
    .onNodeClick(function(n){ showPanel(n); hideHint(); })
    .onBackgroundClick(closePanel);

  window.addEventListener('resize', function(){
    Graph.width(el.offsetWidth).height(el.offsetHeight);
  });

  document.getElementById('status').textContent =
    D.tasks.length + ' tasks · ' + D.projects.length + ' projects';

  if(!D.tasks.length && !D.projects.length)
    document.getElementById('empty').style.display = 'flex';
}

// ── Panel ─────────────────────────────────────────────────
function showPanel(node) {
  var c = document.getElementById('pc');
  var close = '<button class="pcls" onclick="closePanel()">×</button>';

  if (node.type === 'self') {
    var active = D.tasks.filter(function(t){return!t.done;}).length;
    var done   = D.tasks.filter(function(t){return t.done;}).length;
    c.innerHTML = close +
      '<div style="font-size:30px;margin-bottom:8px">👤</div>'+
      '<div class="ptitle">You</div>'+
      '<div class="srow">'+
        '<div class="sbox" style="background:rgba(124,111,255,.12)"><div class="snum" style="color:#7C6FFF">'+active+'</div><div class="slbl">Active</div></div>'+
        '<div class="sbox" style="background:rgba(22,163,127,.12)"><div class="snum" style="color:#16A37F">'+done+'</div><div class="slbl">Done</div></div>'+
        '<div class="sbox" style="background:rgba(255,255,255,.05)"><div class="snum" style="color:#fff">'+D.projects.length+'</div><div class="slbl">Projects</div></div>'+
      '</div>';
  }

  else if (node.type === 'project') {
    var p = node.proj;
    var ptasks = D.tasks.filter(function(t){return t.projectId===p.id;});
    var avg = ptasks.length ? Math.round(ptasks.reduce(function(s,t){return s+pct(t);},0)/ptasks.length) : 0;
    c.innerHTML = close +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;clear:both">'+
        '<div style="width:14px;height:14px;border-radius:50%;background:'+p.color+'"></div>'+
        '<div class="ptitle" style="margin:0">'+xe(p.name)+'</div>'+
      '</div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,.3);margin-bottom:8px">'+ptasks.length+' tasks · '+avg+'% overall</div>'+
      '<div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" style="width:'+avg+'%;background:'+p.color+'"></div></div></div>'+
      ptasks.map(function(t){var pp=pct(t);return'<div class="ptcard"><div class="ptname">'+xe(t.title)+'</div><div class="mbar"><div class="mfill" style="width:'+pp+'%;background:'+(t.done?'#16A37F':'#7C6FFF')+'"></div></div></div>';}).join('');
  }

  else if (node.type === 'task') {
    var t = node.task;
    var proj = t.projectId ? gp(t.projectId) : null;
    var pp = pct(t);
    var curr = t.steps.find(function(s){return s.current&&!s.done;});
    var doneS = t.steps.filter(function(s){return s.done;}).length;
    c.innerHTML = close +
      (proj ? '<div class="ptag" style="background:'+proj.color+'20;border:1px solid '+proj.color+'44;color:'+proj.color+'">'+xe(proj.name)+'</div>'
             : '<div style="font-size:10px;color:rgba(255,255,255,.2);margin-bottom:8px">No project</div>') +
      '<div class="ptitle">'+xe(t.title)+'</div>'+
      (t.assignee ? '<div class="pmeta"><i class="ti ti-user"></i> '+xe(t.assignee)+'</div>' : '') +
      '<div class="pbar-wrap"><div class="pbar-lbl"><span>Progress</span><span>'+pp+'%</span></div>'+
        '<div class="pbar"><div class="pbar-fill" style="width:'+pp+'%;background:'+(t.done?'#16A37F':'#7C6FFF')+'"></div></div></div>'+
      (curr ? '<div class="pcurr"><div class="pcurr-lbl">CURRENT STEP</div><div class="pcurr-txt">'+xe(curr.text)+'</div>'+(curr.delegatedTo?'<div class="pcurr-del">→ '+xe(curr.delegatedTo)+'</div>':'')+'</div>' : '') +
      '<div class="pstep-lbl">'+doneS+'/'+t.steps.length+' steps done</div>'+
      t.steps.map(function(s){
        return '<div class="pstep"><div class="pstep-c'+(s.done?' dk':'')+'"></div><span class="pstep-t'+(s.done?' dk':'')+'">'+xe(s.text)+'</span></div>';
      }).join('');
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel(){document.getElementById('panel').classList.remove('open');}
var _hh=false;
function hideHint(){if(_hh)return;_hh=true;document.getElementById('hint').classList.add('hide');}

// ── Load + realtime ───────────────────────────────────────
async function init() {
  try {
    var res = await db.from('chain_state').select('data').eq('id','main').maybeSingle();
    if (res.error) throw res.error;
    if (res.data) {
      D = res.data.data || {tasks:[],log:[],projects:[]};
      if(!D.tasks)    D.tasks    = [];
      if(!D.log)      D.log      = [];
      if(!D.projects) D.projects = [];
    }
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('status').textContent = 'Load error';
  }

  initGraph(buildGraph());
  setTimeout(function(){ document.getElementById('hint').classList.add('hide'); }, 5000);

  db.channel('map_sync')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'chain_state',filter:'id=eq.main'},
      function(payload){
        if(!payload.new) return;
        D = payload.new.data || {tasks:[],log:[],projects:[]};
        if(!D.tasks)    D.tasks    = [];
        if(!D.projects) D.projects = [];
        if(Graph) Graph.graphData(buildGraph());
        document.getElementById('status').textContent = D.tasks.length+' tasks · '+D.projects.length+' projects';
      })
    .subscribe();
}

init();
</script>
</body>
</html>
